<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barbara Style — Pastille & Timbre · propositions</title>

<link rel="stylesheet" href="../_ds/barbara-style-design-system-eb963975-6997-4898-83ea-ec9c66b57d41/tokens/fonts.css">
<link rel="stylesheet" href="../_ds/barbara-style-design-system-eb963975-6997-4898-83ea-ec9c66b57d41/tokens/colors.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="marks.jsx"></script>

<script type="text/babel" data-presets="react">
  function Frame({ children }) {
    return (
      <div style={{ width: '100%', height: '100%', background: '#faf6ee', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-start', padding: '30px 22px 22px', boxSizing: 'border-box' }}>
        {children}
      </div>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="pastille" title="La pastille" subtitle="Le marqueur produit (Nouveau · promo · best-seller) — 6 directions. La promo reprend la même forme en terracotta (--danger).">
          <DCArtboard id="p1" label="01 · Pleine or — actuelle" width={252} height={392}><Frame><MiniCard><PFill/></MiniCard><Cap sub="La pilule pleine actuelle. Lisible, franche, très « boutique ».">Pleine or</Cap></Frame></DCArtboard>
          <DCArtboard id="p2" label="02 · Contour fin" width={252} height={392}><Frame><MiniCard><POutline/></MiniCard><Cap sub="Filet doré sur verre dépoli. Plus discret, plus éditorial.">Contour fin</Cap></Frame></DCArtboard>
          <DCArtboard id="p3" label="03 · Serif italique" width={252} height={392}><Frame><MiniCard><PSerif/></MiniCard><Cap sub="Mot manuscrit posé à même l'image + filet. Le plus raffiné.">Serif italique</Cap></Frame></DCArtboard>
          <DCArtboard id="p4" label="04 · Cartouche postal" width={252} height={392}><Frame><MiniCard><PCartouche/></MiniCard><Cap sub="Étiquette rectangulaire à double filet. Esprit tampon vintage.">Cartouche</Cap></Frame></DCArtboard>
          <DCArtboard id="p5" label="05 · Cachet soleil" width={252} height={392}><Frame><MiniCard><PSeal/></MiniCard><Cap sub="Sceau rond rayonnant, clin d'œil au monogramme soleil.">Cachet soleil</Cap></Frame></DCArtboard>
          <DCArtboard id="p6" label="06 · Coin ruban" width={252} height={392}><Frame><MiniCard ribbon><PRibbon/></MiniCard><Cap sub="Bannière diagonale dans l'angle. Très visible, promo idéale.">Coin ruban</Cap></Frame></DCArtboard>
        </DCSection>

        <DCSection id="timbre" title="Le timbre" subtitle="Le cachet rond de la carte postale, avec ses vagues d'oblitération — 6 variantes. Bleu d'Azur ou or solaire.">
          <DCArtboard id="t1" label="01 · Oblitération classique" width={340} height={300}><Frame><PaperPanel w={296} h={150}><TWave1/></PaperPanel><Cap sub="Le cachet rond actuel + les vagues qui filent à droite.">Classique</Cap></Frame></DCArtboard>
          <DCArtboard id="t2" label="02 · Vagues traversantes" width={340} height={300}><Frame><PaperPanel w={296} h={150}><TWave2/></PaperPanel><Cap sub="L'oblitération passe par-dessus le cachet, légèrement inclinée.">Traversantes</Cap></Frame></DCArtboard>
          <DCArtboard id="t3" label="03 · Cachet à date" width={340} height={300}><Frame><PaperPanel w={296} h={150}><TWave3/></PaperPanel><Cap sub="La date au centre entre deux filets — le vrai cachet à date.">Cachet à date</Cap></Frame></DCArtboard>
          <DCArtboard id="t4" label="04 · Version or" width={340} height={300}><Frame><PaperPanel w={296} h={150}><TWave4/></PaperPanel><Cap sub="La classique déclinée en or solaire plutôt qu'en azur.">Version or</Cap></Frame></DCArtboard>
          <DCArtboard id="t5" label="05 · Oblitération soleil" width={340} height={300}><Frame><PaperPanel w={296} h={150}><TWave5/></PaperPanel><Cap sub="Les vagues rayonnent en éventail, comme un soleil. En or.">Éventail soleil</Cap></Frame></DCArtboard>
          <DCArtboard id="t6" label="06 · Grand cachet voyagé" width={340} height={300}><Frame><PaperPanel w={296} h={150}><TWave6/></PaperPanel><Cap sub="Cachet appuyé, daté, longues vagues larges. Le plus « voyagé ».">Grand cachet</Cap></Frame></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  function mount() {
    if (!window.DesignCanvas || !window.MiniCard) return setTimeout(mount, 40);
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  }
  mount();
</script>
</body>
</html>
