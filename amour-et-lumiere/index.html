<!DOCTYPE html>
<html lang="fr" data-hero="pins">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amour et Lumière — Studio photo à Bègles</title>
  <meta name="description" content="Studio photo à Bègles (Gironde). Famille, grossesse, nouveau-né, couple, portrait. Réservez et réglez votre séance en ligne — livraison sous 48 h.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Mulish:wght@400;500;600;700&family=Parisienne&display=swap" rel="stylesheet">
  <script>
    // Stripe.js bloque eval() via CSP sur file:// — on ne le charge qu'en production
    if (location.protocol !== 'file:') {
      document.write('<script src="https://js.stripe.com/v3/"><\/script>');
    }
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <style>
    /* ── TOKENS ─────────────────────────────────────────────── */
    :root {
      --sage-50:#F1F4EB; --sage-100:#E6EBDC; --sage-200:#CDD6BD;
      --sage-300:#AEBB98; --sage-400:#94A37B; --sage-500:#7E8E64;
      --sage-600:#6C7C54; --sage-700:#56653F; --sage-800:#414C30; --sage-900:#2F3724;

      --paper:#FEFDFB; --ivory:#F9F6F1; --sand:#ECE4D6;
      --stone-100:#E4DACA; --stone-200:#D6CAB6; --stone-300:#BCAD95;
      --stone-400:#9C8E77; --stone-500:#7C715E;

      --ink-900:#26241F; --ink-700:#423E37; --ink-500:#6A6358; --ink-400:#8B8374;
      --blush-500:#CE8E78; --blush-700:#B06B54;
      --success-fg:#4C6A3A; --error-fg:#A8503E; --error-bg:#F3DED7;

      --bg-page:var(--paper); --bg-surface:var(--ivory);
      --bg-raised:#FFFFFF; --bg-sunken:var(--sand); --bg-wash:var(--sage-50);

      --text-heading:var(--ink-900); --text-body:var(--ink-700);
      --text-muted:var(--ink-500); --text-faint:var(--ink-400);

      --brand:var(--sage-600); --brand-strong:var(--sage-700);
      --brand-soft:var(--sage-100); --brand-tint:var(--sage-50);

      --border-hairline:var(--stone-200); --border-soft:var(--stone-100);
      --focus-ring:var(--sage-400);

      --font-display:'Cormorant Garamond',Georgia,serif;
      --font-body:'Mulish',system-ui,sans-serif;
      --font-script:'Parisienne',cursive;

      --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem;
      --text-md:1.125rem; --text-lg:1.375rem; --text-xl:1.75rem;
      --text-2xl:2.25rem; --text-3xl:3rem; --text-4xl:4rem; --text-5xl:5.5rem;

      --fw-light:300; --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
      --lh-tight:1.08; --lh-snug:1.22; --lh-normal:1.5; --lh-relaxed:1.7;
      --tracking-tight:-0.01em; --tracking-eyebrow:0.22em; --tracking-wide:0.08em;

      --space-1:.25rem; --space-2:.5rem; --space-3:.75rem; --space-4:1rem;
      --space-5:1.5rem; --space-6:2rem; --space-7:2.5rem; --space-8:3rem;
      --space-10:4rem; --space-12:5rem; --space-16:7.5rem;

      --radius-xs:4px; --radius-sm:8px; --radius-md:12px; --radius-lg:18px;
      --radius-xl:28px; --radius-2xl:40px; --radius-pill:999px; --radius-circle:50%;

      --shadow-xs:0 1px 2px rgba(58,48,33,.06);
      --shadow-sm:0 2px 8px rgba(58,48,33,.07);
      --shadow-md:0 8px 24px rgba(58,48,33,.09);
      --shadow-lg:0 18px 48px rgba(58,48,33,.12);
      --shadow-xl:0 32px 80px rgba(58,48,33,.16);
      --shadow-inset-hairline:inset 0 0 0 1px rgba(58,48,33,.06);

      --ease-soft:cubic-bezier(.22,.61,.36,1);
      --dur-fast:140ms; --dur-base:240ms; --dur-slow:420ms; --dur-photo:720ms;

      --container-lg:1120px; --container-xl:1320px;
    }

    /* ── BASE ────────────────────────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%}
    body{margin:0;background:var(--bg-page);color:var(--text-body);font-family:var(--font-body);
      font-size:var(--text-base);line-height:var(--lh-relaxed);-webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility}
    h1,h2,h3,h4{font-family:var(--font-display);font-weight:var(--fw-regular);
      color:var(--text-heading);line-height:var(--lh-snug);letter-spacing:var(--tracking-tight);
      margin:0 0 var(--space-4);text-wrap:balance}
    h1{font-size:var(--text-3xl);font-weight:var(--fw-light);line-height:var(--lh-tight)}
    h2{font-size:var(--text-2xl)} h3{font-size:var(--text-xl)}
    p{margin:0 0 var(--space-4);text-wrap:pretty}
    a{color:var(--brand-strong);text-decoration:none;transition:color var(--dur-fast) var(--ease-soft)}
    a:hover{color:var(--sage-800)} img{max-width:100%;display:block}
    strong{font-weight:var(--fw-semibold);color:var(--text-heading)}
    :focus-visible{outline:3px solid var(--focus-ring);outline-offset:2px;border-radius:var(--radius-xs)}
    ::selection{background:var(--sage-200);color:var(--ink-900)}

    .al-eyebrow{font-family:var(--font-body);font-weight:var(--fw-semibold);font-size:var(--text-xs);
      text-transform:uppercase;letter-spacing:var(--tracking-eyebrow);color:var(--brand);
      display:inline-flex;align-items:center;gap:var(--space-2)}
    .al-eyebrow::before{content:"";width:22px;height:1px;background:currentColor;opacity:.6}
    .al-script{font-family:var(--font-script);font-weight:400;color:var(--brand);letter-spacing:0;line-height:1}

    /* ── BUTTON ──────────────────────────────────────────────── */
    .alc-btn{font-family:var(--font-body);font-weight:var(--fw-semibold);
      display:inline-flex;align-items:center;justify-content:center;gap:.55em;
      border:1.5px solid transparent;background:var(--sage-600);color:var(--paper);
      border-radius:var(--radius-pill);cursor:pointer;text-decoration:none;white-space:nowrap;
      line-height:1;letter-spacing:.01em;
      transition:transform var(--dur-fast) var(--ease-soft),background var(--dur-fast) var(--ease-soft),
      box-shadow var(--dur-fast) var(--ease-soft),border-color var(--dur-fast) var(--ease-soft);
      box-shadow:var(--shadow-xs)}
    .alc-btn:hover{background:var(--sage-700);transform:translateY(-1px);box-shadow:var(--shadow-md)}
    .alc-btn:active{transform:translateY(0);box-shadow:var(--shadow-xs)}
    .alc-btn[disabled]{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .alc-btn--sm{font-size:var(--text-sm);padding:.62em 1.15em}
    .alc-btn--md{font-size:var(--text-base);padding:.8em 1.6em}
    .alc-btn--lg{font-size:var(--text-md);padding:.95em 2.1em}
    .alc-btn--secondary{background:var(--bg-raised);color:var(--sage-700);border-color:var(--stone-200)}
    .alc-btn--secondary:hover{background:var(--sage-50);border-color:var(--sage-300)}
    .alc-btn--ghost{background:transparent;color:var(--sage-700);border-color:transparent;box-shadow:none}
    .alc-btn--ghost:hover{background:var(--sage-50);box-shadow:none}
    .alc-btn--on-photo{background:rgba(255,255,255,.92);color:var(--ink-900);border-color:transparent}
    .alc-btn--on-photo:hover{background:#fff}
    .alc-btn__icon{display:inline-flex} .alc-btn__icon svg{width:1.15em;height:1.15em}

    /* ── BADGE ───────────────────────────────────────────────── */
    .alc-badge{font-family:var(--font-body);font-weight:var(--fw-semibold);font-size:var(--text-xs);
      display:inline-flex;align-items:center;gap:.4em;line-height:1;white-space:nowrap;
      padding:.5em .85em;border-radius:var(--radius-pill)}
    .alc-badge--brand{background:var(--sage-100);color:var(--sage-800)}
    .alc-badge__ico{display:inline-flex} .alc-badge__ico svg{width:1.05em;height:1.05em}

    /* ── TEXTFIELD ───────────────────────────────────────────── */
    .alc-field{display:flex;flex-direction:column;gap:.4rem;font-family:var(--font-body)}
    .alc-field__label{font-size:var(--text-sm);font-weight:var(--fw-semibold);color:var(--ink-700)}
    .alc-field__req{color:var(--blush-500);margin-left:.15em}
    .alc-field__control{font-family:var(--font-body);font-size:var(--text-base);color:var(--ink-900);
      background:var(--bg-raised);border:1.5px solid var(--stone-200);border-radius:var(--radius-md);
      padding:.7rem .9rem;width:100%;transition:border-color var(--dur-fast) var(--ease-soft),
      box-shadow var(--dur-fast) var(--ease-soft)}
    .alc-field__control::placeholder{color:var(--ink-400)}
    .alc-field__control:hover{border-color:var(--stone-300)}
    .alc-field__control:focus{outline:none;border-color:var(--sage-400);box-shadow:0 0 0 3px var(--sage-100)}
    .alc-field--invalid .alc-field__control{border-color:var(--error-fg)}
    textarea.alc-field__control{resize:vertical;min-height:96px;line-height:var(--lh-normal)}
    .alc-field__hint{font-size:var(--text-xs);color:var(--ink-400)}
    .alc-field--invalid .alc-field__hint{color:var(--error-fg)}
    .alc-field__wrap{position:relative;display:flex;align-items:center}
    .alc-field__icon{position:absolute;left:.85rem;display:inline-flex;color:var(--ink-400);pointer-events:none}
    .alc-field__icon svg{width:1.15em;height:1.15em}
    .alc-field__wrap--icon .alc-field__control{padding-left:2.5rem}

    /* ── SERVICECARD ─────────────────────────────────────────── */
    .alc-svc{display:flex;flex-direction:column;text-decoration:none;color:inherit;
      background:var(--bg-raised);border-radius:var(--radius-lg);overflow:hidden;
      box-shadow:var(--shadow-sm);position:relative;
      transition:transform var(--dur-base) var(--ease-soft),box-shadow var(--dur-base) var(--ease-soft)}
    .alc-svc:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .alc-svc__media{position:relative;aspect-ratio:4/5;overflow:hidden}
    .alc-svc__media img{width:100%;height:100%;object-fit:cover;display:block;
      transition:transform var(--dur-photo) var(--ease-soft)}
    .alc-svc:hover .alc-svc__media img{transform:scale(1.05)}
    .alc-svc__scrim{position:absolute;inset:0;background:linear-gradient(0deg,rgba(20,18,15,.62),rgba(20,18,15,0) 60%)}
    .alc-svc__cap{position:absolute;left:0;right:0;bottom:0;padding:var(--space-5) var(--space-4) var(--space-4);color:#fff}
    .alc-svc__title{font-family:var(--font-display);font-weight:var(--fw-regular);
      font-size:var(--text-xl);line-height:1.1;margin:0}
    .alc-svc__desc{font-family:var(--font-body);font-size:var(--text-sm);
      line-height:var(--lh-normal);margin:.3rem 0 0;opacity:.92}
    .alc-svc__cue{position:absolute;top:var(--space-4);right:var(--space-4);
      width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);
      display:flex;align-items:center;justify-content:center;color:var(--sage-700);
      transform:translateY(6px);opacity:0;transition:all var(--dur-base) var(--ease-soft)}
    .alc-svc:hover .alc-svc__cue{transform:translateY(0);opacity:1}
    .alc-svc__cue svg{width:18px;height:18px}

    /* ── SCROLL + SECTION RHYTHM ─────────────────────────────── */
    .al-scroll{height:100vh;overflow-y:auto;scroll-behavior:smooth;background:var(--bg-page)}
    section{scroll-margin-top:84px}

    /* ── HEADER ──────────────────────────────────────────────── */
    .lp-header{position:sticky;top:0;z-index:40;
      transition:background var(--dur-base) var(--ease-soft),box-shadow var(--dur-base) var(--ease-soft)}
    .lp-header--solid{background:rgba(250,248,243,.86);backdrop-filter:blur(12px);
      box-shadow:0 1px 0 rgba(58,48,33,.07)}
    .lp-header__inner{max-width:var(--container-xl);margin-inline:auto;
      padding:var(--space-4) var(--space-6);display:flex;align-items:center;gap:var(--space-6)}
    .lp-header__brand{display:flex;flex:none}
    .lp-header__brand img{height:30px;width:auto}
    .lp-header__nav{display:flex;gap:var(--space-6);margin-left:auto}
    .lp-header__nav a{font-family:var(--font-body);font-size:var(--text-sm);
      font-weight:var(--fw-semibold);color:var(--ink-700);letter-spacing:.01em}
    .lp-header__nav a:hover{color:var(--sage-700)}
    .lp-header__cta{flex:none}

    /* ── HERO — PLEIN CADRE ──────────────────────────────────── */
    .lp-hero{position:relative;min-height:88vh;display:flex;align-items:flex-end;overflow:hidden}
    .lp-hero__media{position:absolute;inset:0}
    .lp-hero__media img{width:100%;height:100%;object-fit:cover;object-position:center 28%;
      animation:lp-kenburns 24s var(--ease-soft) infinite alternate}
    @keyframes lp-kenburns{from{transform:scale(1)}to{transform:scale(1.07)}}
    .lp-hero__scrim{position:absolute;inset:0;background:
      linear-gradient(180deg,rgba(20,18,15,.30) 0%,rgba(20,18,15,0) 30%),
      linear-gradient(0deg,rgba(20,18,15,.66) 0%,rgba(20,18,15,.08) 52%)}
    .lp-hero__content{position:relative;max-width:var(--container-xl);width:100%;
      margin-inline:auto;padding:var(--space-12) var(--space-6) var(--space-10);color:#fff}
    .lp-hero__eyebrow{font-family:var(--font-body);font-weight:var(--fw-semibold);
      font-size:var(--text-xs);text-transform:uppercase;letter-spacing:var(--tracking-eyebrow);
      color:rgba(255,255,255,.9);display:inline-flex;align-items:center;gap:.6em}
    .lp-hero__eyebrow::before{content:"";width:26px;height:1px;background:currentColor;opacity:.7}
    .lp-hero__title{font-family:var(--font-display);font-weight:var(--fw-light);
      font-size:clamp(2.6rem,6vw,var(--text-5xl));line-height:1.02;letter-spacing:-.01em;
      color:#fff;margin:var(--space-4) 0 var(--space-4);text-shadow:0 2px 30px rgba(0,0,0,.25)}
    .lp-hero__title em{font-style:italic;font-weight:var(--fw-regular)}
    .lp-hero__lead{font-family:var(--font-body);font-size:var(--text-md);
      line-height:var(--lh-relaxed);max-width:36rem;color:rgba(255,255,255,.94);
      margin:0 0 var(--space-6)}
    .lp-hero__actions{display:flex;align-items:center;gap:var(--space-5);
      flex-wrap:wrap;margin-bottom:var(--space-7)}
    .lp-hero__link{font-family:var(--font-body);font-weight:var(--fw-semibold);
      font-size:var(--text-base);color:#fff;padding-bottom:2px;
      border-bottom:1.5px solid rgba(255,255,255,.5)}
    .lp-hero__link:hover{color:#fff;border-color:#fff}
    .lp-hero__reassure{display:flex;gap:var(--space-6);flex-wrap:wrap}
    .lp-hero__reassure span{display:inline-flex;align-items:center;gap:.5em;
      font-family:var(--font-body);font-size:var(--text-sm);font-weight:var(--fw-medium);
      color:rgba(255,255,255,.92)}
    .lp-hero__reassure svg{width:1.15em;height:1.15em;opacity:.9}

    /* ── POSTER EYEBROW + ACTIONS (shared by pins & other hero variants) ── */
    .lp-poster__eyebrow{font-family:var(--font-body);font-weight:var(--fw-semibold);
      font-size:var(--text-xs);text-transform:uppercase;letter-spacing:var(--tracking-eyebrow);
      color:var(--brand);display:inline-flex;align-items:center;gap:.6em}
    .lp-poster__eyebrow::before{content:"";width:26px;height:1px;background:currentColor;opacity:.7}
    .lp-poster__actions{display:flex;align-items:center;gap:var(--space-5);flex-wrap:wrap;justify-content:center}

    /* ── HERO — GALERIE ÉPINGLÉE ────────────────────────────── */
    html[data-hero="pins"] .lp-hero{min-height:auto;display:block;background:var(--bg-page);overflow:visible}
    html[data-hero="pins"] .lp-hero__media,
    html[data-hero="pins"] .lp-hero__content{display:none}
    .lp-pins{display:none}
    html[data-hero="pins"] .lp-pins{
      position:relative;min-height:90vh;display:grid;place-items:center;
      padding:var(--space-12) var(--space-6);overflow:hidden}
    .lp-pins__stage{position:absolute;inset:0}
    .lp-pins__ph{
      position:absolute;margin:0;width:clamp(150px,18vw,250px);aspect-ratio:4/5;
      border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-lg);border:6px solid #fff}
    .lp-pins__ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
      transition:opacity 1.1s var(--ease-soft)}
    .lp-pins__ph--1{top:7%;left:6%;transform:rotate(-7deg)}
    .lp-pins__ph--2{bottom:8%;left:12%;transform:rotate(5deg)}
    .lp-pins__ph--3{top:10%;right:7%;transform:rotate(6deg)}
    .lp-pins__ph--4{bottom:9%;right:11%;transform:rotate(-5deg)}
    .lp-pins__copy{
      position:relative;z-index:2;text-align:center;
      background:color-mix(in srgb,var(--bg-page) 82%,transparent);backdrop-filter:blur(7px);
      border-radius:var(--radius-2xl);padding:var(--space-10) var(--space-10) var(--space-12);
      box-shadow:var(--shadow-md);max-width:40rem}
    .lp-pins__title{
      font-family:var(--font-display);font-weight:var(--fw-light);
      font-size:clamp(2.4rem,5.5vw,5rem);line-height:1.0;letter-spacing:-.02em;
      color:var(--ink-900);margin:var(--space-4) 0 var(--space-6)}
    .lp-pins__title em{font-style:italic;color:var(--brand)}
    .lp-pins .lp-poster__actions{justify-content:center}
    .lp-pins .lp-poster__eyebrow::before{display:none}

    /* ── OFFER ───────────────────────────────────────────────── */
    .lp-offer{background:var(--bg-page);padding:var(--space-16) var(--space-6) var(--space-12);
      text-align:center}
    .lp-offer__head{max-width:46rem;margin:0 auto var(--space-10);
      display:flex;flex-direction:column;align-items:center;gap:var(--space-3)}
    .lp-offer__title{font-size:clamp(1.9rem,4vw,var(--text-2xl));margin:0}
    .lp-offer__cta{margin-top:var(--space-10)}

    /* flow éditorial */
    .lp-flow{display:grid;grid-template-columns:1fr 48px 1fr 48px 1fr;
      align-items:start;max-width:var(--container-xl);margin:0 auto;padding:0}
    .lp-flow__sep{display:flex;align-items:center;justify-content:center;
      padding-top:5.5rem;color:var(--sage-200);font-size:1.6rem;line-height:1;
      pointer-events:none;user-select:none}
    .lp-flow__item{display:flex;flex-direction:column;align-items:center;
      text-align:center;padding:0 var(--space-4)}
    /* grand numéro décoratif */
    .lp-flow__num{font-family:var(--font-display);font-style:italic;font-weight:var(--fw-light);
      font-size:clamp(5rem,9vw,8.5rem);line-height:1;letter-spacing:-.02em;
      color:var(--sage-100);margin-bottom:var(--space-3);user-select:none}
    /* icône */
    .lp-flow__icon{width:54px;height:54px;border-radius:50%;
      background:var(--bg-raised);border:1.5px solid var(--sage-200);
      display:inline-flex;align-items:center;justify-content:center;
      color:var(--sage-700);font-size:20px;
      box-shadow:var(--shadow-xs);margin-bottom:var(--space-5)}
    /* label étape */
    .lp-flow__tag{font-family:var(--font-body);font-size:var(--text-xs);
      font-weight:var(--fw-semibold);letter-spacing:.22em;text-transform:uppercase;
      color:var(--sage-400);margin-bottom:var(--space-2)}
    /* titre */
    .lp-flow__title{font-family:var(--font-display);font-weight:var(--fw-light);
      font-size:clamp(1.25rem,2.2vw,1.7rem);line-height:1.15;
      color:var(--ink-900);margin:0 0 var(--space-3)}
    /* description */
    .lp-flow__desc{font-size:var(--text-sm);color:var(--text-muted);
      line-height:var(--lh-relaxed);margin:0;max-width:24ch}

    /* ── PRESTATIONS ─────────────────────────────────────────── */
    .lp-prest{max-width:var(--container-xl);margin-inline:auto;padding:var(--space-12) var(--space-6)}
    .lp-prest__head{display:flex;align-items:flex-end;justify-content:space-between;
      gap:var(--space-8);margin-bottom:var(--space-8);flex-wrap:wrap}
    .lp-prest__title{font-size:clamp(1.9rem,4vw,var(--text-2xl));margin:var(--space-2) 0 0}
    .lp-prest__lead{font-size:var(--text-md);color:var(--text-muted);max-width:28rem;margin:0}
    .lp-prest__grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-5)}

    /* ── PRICING ─────────────────────────────────────────────── */
    .lp-pricing{max-width:var(--container-lg);margin-inline:auto;
      padding:var(--space-16) var(--space-6) var(--space-12)}
    .lp-pricing__head{max-width:46rem;margin:0 auto var(--space-10);text-align:center;
      display:flex;flex-direction:column;align-items:center;gap:var(--space-3)}
    .lp-pricing__title{font-size:clamp(1.9rem,4vw,var(--text-2xl));margin:0}
    .lp-pricing__lead{font-size:var(--text-md);color:var(--text-muted);margin:0;max-width:40rem}
    .lp-formules{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5)}
    .lp-formule{display:flex;flex-direction:column;align-items:stretch;text-align:left;
      cursor:pointer;background:var(--bg-raised);border:1.5px solid var(--border-hairline);
      border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-sm);color:var(--ink-900);
      transition:border-color var(--dur-base) var(--ease-soft),
      box-shadow var(--dur-base) var(--ease-soft),transform var(--dur-fast) var(--ease-soft)}
    .lp-formule:hover{border-color:var(--sage-300);box-shadow:var(--shadow-md);transform:translateY(-2px)}
    /* photo illustrative */
    .lp-formule__photo{width:100%;aspect-ratio:3/2;overflow:hidden;flex:none}
    .lp-formule__photo img{width:100%;height:100%;object-fit:cover;
      transition:transform var(--dur-photo) var(--ease-soft)}
    .lp-formule:hover .lp-formule__photo img{transform:scale(1.04)}
    /* contenu sous la photo */
    .lp-formule__content{display:grid;grid-template-columns:auto 1fr auto;align-items:center;
      gap:var(--space-3) var(--space-4);padding:var(--space-5)}
    .lp-formule__icon{display:inline-flex;align-items:center;justify-content:center;
      width:48px;height:48px;border-radius:var(--radius-circle);
      background:var(--sage-50);color:var(--sage-700);font-size:22px;flex:none;
      transition:background var(--dur-base),color var(--dur-base)}
    .lp-formule__body{display:flex;flex-direction:column;gap:3px;min-width:0}
    .lp-formule__name{font-family:var(--font-display);font-weight:var(--fw-regular);
      font-size:var(--text-xl);line-height:1}
    .lp-formule__sub{font-family:var(--font-body);font-size:var(--text-sm);color:var(--text-muted)}
    .lp-formule__from{font-family:var(--font-display);font-variant-numeric:lining-nums tabular-nums;
      font-size:var(--text-lg);color:var(--sage-700);white-space:nowrap}
    .lp-formule__cue{grid-column:1/-1;display:inline-flex;align-items:center;gap:.45em;
      font-family:var(--font-body);font-weight:var(--fw-semibold);font-size:var(--text-sm);
      color:var(--sage-700)}
    .lp-formule__cue svg{width:1.15em;height:1.15em;
      transition:transform var(--dur-base) var(--ease-soft)}
    .lp-formule:hover .lp-formule__cue svg{transform:translateX(4px)}
    /* état sélectionné */
    .lp-formule--on{border-color:var(--sage-600);box-shadow:0 0 0 2px var(--sage-600),var(--shadow-md)}
    .lp-formule--on:hover{transform:none}
    .lp-formule--on .lp-formule__icon{background:var(--sage-600);color:#fff}
    .lp-formule--on .lp-formule__name{color:var(--sage-800)}
    .lp-formule--on .lp-formule__from{color:var(--sage-700)}
    .lp-formule--on .lp-formule__cue{color:var(--sage-700)}

    .lp-packs{margin-top:var(--space-6);background:var(--bg-raised);
      border:1px solid var(--border-hairline);border-radius:var(--radius-xl);
      padding:var(--space-7);box-shadow:var(--shadow-sm)}
    .lp-packs:not(.lp-packs--empty){animation:lp-rise var(--dur-base) var(--ease-soft)}
    .lp-packs--empty{display:flex;align-items:center;justify-content:center;gap:.7em;
      text-align:center;min-height:132px;background:transparent;border-style:dashed;
      box-shadow:none;color:var(--text-muted)}
    .lp-packs--empty svg{flex:none;width:1.3em;height:1.3em;color:var(--brand)}
    .lp-packs--empty p{font-family:var(--font-body);font-size:var(--text-md);margin:0;max-width:32rem}
    .lp-packs--empty em{font-style:normal;font-weight:var(--fw-semibold);color:var(--sage-700)}
    .lp-packs__top{display:flex;align-items:baseline;justify-content:space-between;
      gap:var(--space-3) var(--space-5);flex-wrap:wrap;margin-bottom:var(--space-3)}
    .lp-packs__title{font-family:var(--font-display);font-weight:var(--fw-regular);
      font-size:var(--text-2xl);line-height:1;margin:0}
    .lp-packs__sub{font-family:var(--font-body);font-size:var(--text-sm);color:var(--text-muted)}
    .lp-packs__list{list-style:none;margin:0;padding:0}
    .lp-pack-row{display:flex;align-items:baseline;gap:var(--space-3);padding:var(--space-3) 0}
    .lp-pack-row+.lp-pack-row{border-top:1px solid var(--border-soft)}
    .lp-pack-row__label{font-family:var(--font-body);font-weight:var(--fw-semibold);
      font-size:var(--text-base);color:var(--ink-900);
      display:inline-flex;align-items:baseline;gap:.5em;flex-wrap:wrap}
    .lp-pack-row__label em{font-style:normal;font-weight:var(--fw-regular);
      font-size:var(--text-sm);color:var(--text-muted)}
    .lp-pack-row__dots{flex:1;border-bottom:1px dotted var(--ink-900);
      opacity:.2;transform:translateY(-4px);min-width:18px}
    .lp-pack-row__price{font-family:var(--font-display);font-variant-numeric:lining-nums tabular-nums;
      font-weight:var(--fw-regular);font-size:var(--text-xl);white-space:nowrap;color:var(--ink-900)}
    .lp-pack-row--star{background:var(--sage-50);border-radius:var(--radius-md);
      padding:var(--space-3) var(--space-4);margin:var(--space-2) 0}
    .lp-pack-row--star+.lp-pack-row{border-top:none}
    .lp-pack-row--star .lp-pack-row__price{color:var(--sage-700)}
    .lp-packs__option{display:flex;align-items:center;gap:.65em;
      font-family:var(--font-body);font-size:var(--text-sm);color:var(--text-body);
      margin:var(--space-5) 0 0;padding:var(--space-3) var(--space-4);
      background:var(--sage-50);border-radius:var(--radius-md)}
    .lp-packs__option svg{flex:none;width:1.2em;height:1.2em;color:var(--brand)}
    .lp-packs__option strong{font-weight:var(--fw-semibold);color:var(--ink-900)}
    .lp-packs__fine{font-family:var(--font-display);font-style:italic;
      font-size:var(--text-sm);line-height:var(--lh-normal);
      color:var(--text-muted);margin:var(--space-4) 0 0}
    .lp-complement{margin-top:var(--space-6);background:var(--bg-raised);
      border:1px solid var(--border-hairline);border-radius:var(--radius-xl);
      padding:var(--space-7);box-shadow:var(--shadow-sm)}
    .lp-packs__list--cols{display:grid;grid-template-columns:1fr 1fr;gap:0 var(--space-7)}
    .lp-packs__list--cols .lp-pack-row:nth-child(2){border-top:none}
    .lp-pack-row__ico{display:inline-flex;align-self:center;color:var(--brand)}
    .lp-pack-row__ico svg{width:1.05em;height:1.05em}
    .lp-pricing__cta{display:flex;flex-direction:column;align-items:center;
      gap:var(--space-3);margin-top:var(--space-10)}
    .lp-pricing__reassure{display:inline-flex;align-items:center;gap:.5em;
      font-family:var(--font-body);font-size:var(--text-sm);
      font-weight:var(--fw-medium);color:var(--text-muted)}
    .lp-pricing__reassure svg{width:1.15em;height:1.15em;color:var(--brand)}

    /* ── ABOUT — DUO ─────────────────────────────────────────── */
    .lp-about{max-width:var(--container-xl);margin-inline:auto;
      padding:var(--space-12) var(--space-6);
      display:grid;grid-template-columns:1fr 1fr;gap:var(--space-10);align-items:center}
    .lp-about__duo{position:relative;display:grid;grid-template-columns:1fr 1fr;
      gap:var(--space-4);align-items:start}
    .lp-duo__item{position:relative;margin:0;border-radius:var(--radius-xl);
      overflow:hidden;box-shadow:var(--shadow-lg);aspect-ratio:4/5;background:var(--bg-surface)}
    .lp-duo__item:nth-child(2){margin-top:var(--space-8)}
    .lp-duo__item img{width:100%;height:100%;object-fit:cover;display:block;
      transition:transform var(--dur-photo) var(--ease-soft)}
    .lp-duo__item:hover img{transform:scale(1.04)}
    .lp-duo__item figcaption{position:absolute;left:var(--space-3);bottom:var(--space-3);
      background:rgba(250,248,243,.92);backdrop-filter:blur(6px);
      font-family:var(--font-body);font-weight:var(--fw-semibold);font-size:var(--text-sm);
      color:var(--ink-900);padding:.4em .9em;border-radius:var(--radius-pill);
      box-shadow:var(--shadow-sm)}
    .lp-about__chip{position:absolute;top:-14px;left:50%;right:auto;bottom:auto;
      transform:translateX(-50%);z-index:2;display:inline-flex;align-items:center;gap:.5em;
      background:rgba(250,248,243,.92);backdrop-filter:blur(6px);color:var(--ink-900);
      font-family:var(--font-body);font-weight:var(--fw-semibold);font-size:var(--text-sm);
      padding:.55em 1em;border-radius:var(--radius-pill);box-shadow:var(--shadow-sm)}
    .lp-about__chip svg{width:1.1em;height:1.1em;color:var(--sage-700)}
    .lp-about__title{font-size:clamp(1.9rem,3.6vw,var(--text-2xl));
      margin:var(--space-3) 0 var(--space-5)}
    .lp-about__text p{font-size:var(--text-md);color:var(--text-body)}
    .lp-about__badges{display:flex;gap:var(--space-3);flex-wrap:wrap;margin-top:var(--space-5)}

    /* ── GALLERY ─────────────────────────────────────────────── */
    .lp-gal{max-width:var(--container-xl);margin-inline:auto;padding:var(--space-12) var(--space-6)}
    .lp-gal__head{text-align:center;margin-bottom:var(--space-8);
      display:flex;flex-direction:column;align-items:center;gap:var(--space-2)}
    .lp-gal__title{font-size:clamp(1.9rem,4vw,var(--text-2xl));margin:0}
    .lp-gal__grid{columns:3;column-gap:var(--space-3)}
    .lp-gal__item{margin:0 0 var(--space-3);break-inside:avoid;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
    .lp-gal__item img{width:100%;height:auto;display:block;
      transition:transform var(--dur-photo) var(--ease-soft)}
    .lp-gal__item:hover img{transform:scale(1.03)}

    /* ── REVIEWS ─────────────────────────────────────────────── */
    .lp-reviews{max-width:var(--container-xl);margin-inline:auto;padding:var(--space-12) var(--space-6)}
    .lp-reviews__head{text-align:center;max-width:42rem;margin:0 auto var(--space-10);
      display:flex;flex-direction:column;align-items:center;gap:var(--space-2)}
    .lp-reviews__title{font-size:clamp(1.9rem,4vw,var(--text-2xl));margin:0}
    .lp-reviews__lead{font-size:var(--text-md);color:var(--text-muted);margin:0}
    .lp-reviews__grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-5)}
    .lp-review{position:relative;margin:0;background:var(--bg-raised);
      border:1px solid var(--border-hairline);border-radius:var(--radius-lg);
      padding:var(--space-6);box-shadow:var(--shadow-sm);
      display:flex;flex-direction:column;gap:var(--space-3)}
    .lp-review__mark{position:absolute;top:var(--space-5);right:var(--space-5);
      color:var(--brand);opacity:.16}
    .lp-review__mark svg{width:34px;height:34px}
    .lp-review__stars{display:inline-flex;gap:3px;color:var(--brand)}
    .lp-review__stars svg{width:15px;height:15px;fill:currentColor;stroke:currentColor}
    .lp-review__text{font-family:var(--font-display);font-style:italic;
      font-size:var(--text-lg);line-height:var(--lh-normal);color:var(--text-body);margin:0}
    .lp-review__by{display:flex;flex-direction:column;margin-top:auto}
    .lp-review__name{font-family:var(--font-body);font-weight:var(--fw-semibold);
      font-size:var(--text-base);color:var(--ink-900)}
    .lp-review__meta{font-family:var(--font-body);font-size:var(--text-sm);color:var(--text-muted)}

    /* ── BOOKING BAND ────────────────────────────────────────── */
    .lp-book{position:relative;overflow:hidden}
    .lp-book__media{position:absolute;inset:0}
    .lp-book__media img{width:100%;height:100%;object-fit:cover;object-position:center 35%}
    .lp-book__scrim{position:absolute;inset:0;
      background:linear-gradient(0deg,rgba(38,36,31,.72),rgba(38,36,31,.42))}
    .lp-book__inner{position:relative;max-width:44rem;margin-inline:auto;
      padding:var(--space-16) var(--space-6);text-align:center;color:#fff;
      display:flex;flex-direction:column;align-items:center;gap:var(--space-4)}
    .lp-book__script{color:var(--sage-200);font-size:var(--text-2xl);line-height:1}
    .lp-book__title{font-family:var(--font-display);font-weight:var(--fw-light);
      font-size:clamp(2rem,4.6vw,var(--text-3xl));line-height:1.08;color:#fff;margin:0}
    .lp-book__lead{font-size:var(--text-md);color:rgba(255,255,255,.92);
      margin:0 0 var(--space-2);max-width:32rem}
    .lp-book__fine{font-size:var(--text-sm);color:rgba(255,255,255,.78);margin:var(--space-2) 0 0}

    /* ── FOOTER ──────────────────────────────────────────────── */
    .lp-footer{background:var(--sage-900);color:rgba(255,255,255,.82)}
    .lp-footer__inner{max-width:var(--container-xl);margin-inline:auto;
      padding:var(--space-10) var(--space-6) var(--space-8);
      display:grid;grid-template-columns:2fr 1fr 1fr;gap:var(--space-8)}
    .lp-footer__brand img{height:34px;margin-bottom:var(--space-4)}
    .lp-footer__brand p{font-size:var(--text-sm);line-height:var(--lh-relaxed);
      color:rgba(255,255,255,.7);margin:0}
    .lp-footer__col h4{font-family:var(--font-body);font-weight:var(--fw-semibold);
      font-size:var(--text-xs);text-transform:uppercase;letter-spacing:var(--tracking-wide);
      color:rgba(255,255,255,.6);margin:0 0 var(--space-4)}
    .lp-footer__col p{display:flex;align-items:center;gap:.5em;
      font-size:var(--text-sm);color:rgba(255,255,255,.82);margin:0 0 var(--space-3)}
    .lp-footer__col svg{width:1.1em;height:1.1em;color:var(--sage-300)}
    .lp-footer__social{display:flex;gap:var(--space-3)}
    .lp-footer__social a{display:inline-flex;align-items:center;justify-content:center;
      width:40px;height:40px;border-radius:var(--radius-circle);
      background:rgba(255,255,255,.08);color:#fff;font-size:18px;
      transition:background var(--dur-fast) var(--ease-soft)}
    .lp-footer__social a:hover{background:var(--sage-600)}
    .lp-footer__base{border-top:1px solid rgba(255,255,255,.12);
      max-width:var(--container-xl);margin-inline:auto;
      padding:var(--space-4) var(--space-6);display:flex;justify-content:space-between;
      gap:var(--space-4);flex-wrap:wrap;font-size:var(--text-xs);color:rgba(255,255,255,.55)}

    /* ── BOOKING WIZARD MODAL ────────────────────────────────── */
    .lp-modal{position:fixed;inset:0;z-index:80;background:rgba(38,36,31,.5);
      backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
      padding:var(--space-5);animation:lp-fade var(--dur-base) var(--ease-soft)}
    @keyframes lp-fade{from{opacity:0}to{opacity:1}}
    .lp-modal__card{background:var(--bg-page);border-radius:var(--radius-xl);
      padding:var(--space-7);max-width:600px;width:100%;max-height:90vh;overflow-y:auto;
      box-shadow:var(--shadow-xl);position:relative;
      animation:lp-rise var(--dur-base) var(--ease-soft)}
    @keyframes lp-rise{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
    .lp-modal__close{position:absolute;top:var(--space-4);right:var(--space-4);
      width:34px;height:34px;border:none;background:var(--sand);
      border-radius:var(--radius-circle);font-size:20px;line-height:1;
      color:var(--ink-500);cursor:pointer;transition:background var(--dur-fast)}
    .lp-modal__close:hover{background:var(--stone-100)}

    .lp-bk__head{padding-right:var(--space-8)}
    .lp-bk__title{font-family:var(--font-display);font-weight:var(--fw-regular);
      font-size:var(--text-2xl);line-height:1.05;margin:var(--space-2) 0 0}
    .lp-bk__helper{font-family:var(--font-body);font-size:var(--text-sm);
      color:var(--text-muted);margin:var(--space-2) 0 0}
    .lp-bk__progress{margin:var(--space-5) 0 var(--space-6)}
    .lp-bk__progress-meta{display:flex;justify-content:space-between;align-items:baseline;
      font-family:var(--font-body);font-size:var(--text-xs);font-weight:var(--fw-semibold);
      letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted);margin-bottom:var(--space-2)}
    .lp-bk__progress-track{height:3px;border-radius:999px;background:var(--sand);overflow:hidden}
    .lp-bk__progress-fill{height:100%;background:var(--sage-600);border-radius:999px;
      transition:width var(--dur-base) var(--ease-soft)}
    .lp-bk__body{min-height:132px}

    .lp-bk-opts{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
    .lp-bk-opt{display:flex;flex-direction:column;align-items:flex-start;gap:var(--space-2);
      text-align:left;cursor:pointer;padding:var(--space-5);
      border:1.5px solid var(--stone-200);border-radius:var(--radius-lg);
      background:var(--bg-page);color:var(--ink-900);
      transition:border-color var(--dur-fast) var(--ease-soft),
      background var(--dur-fast) var(--ease-soft)}
    .lp-bk-opt:hover{border-color:var(--sage-300)}
    .lp-bk-opt--on{border-color:var(--sage-600);background:var(--sage-50);
      box-shadow:inset 0 0 0 1px var(--sage-600)}
    .lp-bk-opt__icon{display:inline-flex;align-items:center;justify-content:center;
      width:44px;height:44px;border-radius:var(--radius-circle);
      background:var(--sage-100);color:var(--sage-700);font-size:21px}
    .lp-bk-opt__name{font-family:var(--font-display);font-size:var(--text-xl);line-height:1}
    .lp-bk-opt__sub{font-family:var(--font-body);font-size:var(--text-sm);color:var(--text-muted)}
    .lp-bk-opt__from{font-family:var(--font-body);font-size:var(--text-sm);
      font-weight:var(--fw-semibold);color:var(--sage-700);margin-top:var(--space-1)}

    .lp-bk-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3)}
    .lp-bk-tile{position:relative;aspect-ratio:1/1;border:0;padding:0;
      border-radius:var(--radius-md);overflow:hidden;cursor:pointer;
      box-shadow:var(--shadow-inset-hairline)}
    .lp-bk-tile img{width:100%;height:100%;object-fit:cover;
      transition:transform var(--dur-photo) var(--ease-soft)}
    .lp-bk-tile:hover img{transform:scale(1.05)}
    .lp-bk-tile__lbl{position:absolute;left:0;right:0;bottom:0;padding:.5em .7em;
      text-align:left;font-family:var(--font-body);font-weight:var(--fw-semibold);
      font-size:var(--text-sm);color:#fff;
      background:linear-gradient(0deg,rgba(20,18,15,.72),transparent)}
    .lp-bk-tile--on{box-shadow:0 0 0 2.5px var(--sage-600)}
    .lp-bk-tile__check{position:absolute;top:6px;right:6px;width:22px;height:22px;
      border-radius:50%;background:var(--sage-600);color:#fff;
      display:inline-flex;align-items:center;justify-content:center;font-size:13px}

    .lp-bk-packs{display:flex;flex-direction:column;gap:var(--space-2)}
    .lp-bk-pack{display:flex;align-items:center;gap:var(--space-3);text-align:left;
      cursor:pointer;padding:var(--space-4);border:1.5px solid var(--stone-200);
      border-radius:var(--radius-md);background:var(--bg-page);
      transition:border-color var(--dur-fast) var(--ease-soft),
      background var(--dur-fast) var(--ease-soft)}
    .lp-bk-pack:hover{border-color:var(--sage-300)}
    .lp-bk-pack--on{border-color:var(--sage-600);background:var(--sage-50)}
    .lp-bk-pack__radio{position:relative;width:18px;height:18px;border-radius:50%;
      border:1.5px solid var(--stone-300);flex:none}
    .lp-bk-pack--on .lp-bk-pack__radio{border-color:var(--sage-600)}
    .lp-bk-pack--on .lp-bk-pack__radio::after{content:"";position:absolute;inset:3px;
      border-radius:50%;background:var(--sage-600)}
    .lp-bk-pack__label{flex:1;font-family:var(--font-body);font-weight:var(--fw-semibold);
      font-size:var(--text-base);color:var(--ink-900)}
    .lp-bk-pack__label em{display:block;font-style:normal;font-weight:var(--fw-regular);
      font-size:var(--text-sm);color:var(--text-muted)}
    .lp-bk-pack__price{font-family:var(--font-display);
      font-variant-numeric:lining-nums tabular-nums;font-size:var(--text-xl);
      color:var(--ink-900);white-space:nowrap}

    .lp-bk-bw{display:flex;align-items:center;gap:var(--space-3);width:100%;
      margin-top:var(--space-3);padding:var(--space-3) var(--space-4);
      border-radius:var(--radius-md);border:0;background:var(--sage-50);
      cursor:pointer;text-align:left}
    .lp-bk-bw__check{display:inline-flex;align-items:center;justify-content:center;
      width:20px;height:20px;border-radius:var(--radius-xs);
      border:1.5px solid var(--sage-400);flex:none;color:transparent;font-size:12px}
    .lp-bk-bw--on .lp-bk-bw__check{background:var(--sage-600);border-color:var(--sage-600);color:#fff}

    /* ── Stripe card element ─────────────────────────────────── */

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">

    /* ── DATA ─────────────────────────────────────────────────── */

    /* ── ICONS ─────────────────────────────────────────────────── */

      Camera:     I(<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.2"/></>),

      Shield:     I(<><path d="M12 3 19 6v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3Z"/><path d="m9 12 2 2 4-4"/></>),
      Clock:      I(<><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></>),
      CreditCard: I(<><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></>),
      Mail:       I(<><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m3 7 9 6 9-6"/></>),
      Phone:      I(<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.8 2Z"/>),
      Star:       I(<polygon points="12 2 15.1 8.6 22 9.3 17 14.1 18.2 21 12 17.6 5.8 21 7 14.1 2 9.3 8.9 8.6 12 2"/>),

      Frame:      I(<><rect x="4" y="4" width="16" height="16" rx="1"/><path d="M4 9h16M4 15h16M9 4v16M15 4v16"/></>),
      Book:       I(<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5Z"/>),
      Insta:      I(<><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.6" fill="currentColor"/></>),
      Facebook:   I(<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3Z"/>),
    };

    /* ── COMPONENTS ─────────────────────────────────────────────── */
    function Button({ variant='primary', size='md', iconRight, onClick, href, children, disabled, className='' }) {
      const cls = ['alc-btn', `alc-btn--${variant}`, `alc-btn--${size}`, className].filter(Boolean).join(' ');
      const body = <>{children}{iconRight && <span className="alc-btn__icon">{iconRight}</span>}</>;
      const external = href && !href.startsWith('#');
      if (href) return <a href={href} className={cls} {...(external ? {target:'_blank',rel:'noopener'} : {})}>{body}</a>;
      return <button type="button" className={cls} onClick={onClick} disabled={disabled}>{body}</button>;
    }

    function Badge({ tone='brand', icon, children }) {
      return (
        <span className={`alc-badge alc-badge--${tone}`}>
          {icon && <span className="alc-badge__ico">{icon}</span>}
          {children}
        </span>
      );
    }

    function TextField({ label, type='text', placeholder, value, onChange, required, hint, error, icon, multiline, inputMode }) {
      const id = React.useId();
      const invalid = !!error;
      const control = multiline
        ? <textarea id={id} className="alc-field__control" placeholder={placeholder} value={value} onChange={onChange} />
        : <input id={id} type={type} inputMode={inputMode} className="alc-field__control"
            placeholder={placeholder} value={value} onChange={onChange} />;
      return (
        <div className={`alc-field${invalid ? ' alc-field--invalid' : ''}`}>
          <label htmlFor={id} className="alc-field__label">
            {label}{required && <span className="alc-field__req"> *</span>}
          </label>
          {icon ? (
            <div className="alc-field__wrap alc-field__wrap--icon">
              <span className="alc-field__icon">{icon}</span>
              {control}
            </div>
          ) : control}
          {(hint || error) && <span className="alc-field__hint">{error || hint}</span>}
        </div>
      );
    }

    function ServiceCard({ image, title, description }) {
      return (
        <a href="#tarifs" className="alc-svc">
          <div className="alc-svc__media">
            <img src={image} alt={title} loading="lazy" />
            <div className="alc-svc__scrim" />
            <div className="alc-svc__cap">
              <p className="alc-svc__title">{title}</p>
              {description && <p className="alc-svc__desc">{description}</p>}
            </div>
          </div>
          <span className="alc-svc__cue"><Icons.Arrow /></span>
        </a>
      );
    }

    /* ── HEADER ─────────────────────────────────────────────────── */
    function Header({ onBook }) {
      const [scrolled, setScrolled] = React.useState(false);
      React.useEffect(() => {
        const host = document.querySelector('.al-scroll') || window;
        const onScroll = () => setScrolled((host === window ? window.scrollY : host.scrollTop) > 24);
        host.addEventListener('scroll', onScroll);
        return () => host.removeEventListener('scroll', onScroll);
      }, []);
      const links = [['Galerie','#galerie'],['Tarifs','#tarifs'],['Prestations','#prestations'],['Le studio','#studio'],['Avis','#avis']];
      return (
        <header className={'lp-header' + (scrolled ? ' lp-header--solid' : '')}>
          <div className="lp-header__inner">
            <a href="#top" className="lp-header__brand" aria-label="Amour et Lumière — accueil">
              <img src="assets/logo/logo_ink.png" alt="Amour et Lumière" />
            </a>
            <nav className="lp-header__nav">
              {links.map(([l, h]) => <a key={h} href={h}>{l}</a>)}
            </nav>
            <div className="lp-header__cta">
              <Button variant="primary" size="sm" iconRight={<Icons.Arrow />} onClick={onBook}>
                Réserver ma séance
              </Button>
            </div>
          </div>
        </header>
      );

    /* ── HERO — GALERIE ÉPINGLÉE ────────────────────────────────── */
    function PinSlot({ pool, start, interval }) {
      const [layers, setLayers] = React.useState([{src:start,on:true},{src:start,on:false}]);
      React.useEffect(() => {
        const id = setInterval(() => {
          setLayers(prev => {
            const offIdx = prev[0].on ? 1 : 0;
            const onIdx  = offIdx === 0 ? 1 : 0;
            const current = prev[onIdx].src;
            let next = current;
            for (let i = 0; i < 6 && next === current; i++) next = pool[Math.floor(Math.random() * pool.length)];
            const copy = [{...prev[0]},{...prev[1]}];
            copy[offIdx] = {src:next, on:true};
            copy[onIdx]  = {...copy[onIdx], on:false};
            return copy;
          });
        }, interval);
        return () => clearInterval(id);
      }, [pool, interval]);
      return (
        <>
          {layers.map((l, i) => <img key={i} src={l.src} alt="" loading="lazy" style={{opacity: l.on ? 1 : 0}} />)}
        </>
      );
    }

    function Hero({ onBook }) {
      const PIN_POOL = React.useMemo(() => [...new Set([...GALLERY])], []);
      return (

            <img src="assets/images/hero_famille.jpg" alt="Séance famille en studio" />
            <div className="lp-hero__scrim" />
          </div>
          <div className="lp-hero__content" />

          {/* ── Galerie épinglée ── */}
          <div className="lp-pins">
            <div className="lp-pins__stage" aria-hidden="true">
              <figure className="lp-pins__ph lp-pins__ph--1">
                <PinSlot pool={PIN_POOL} start="assets/images/s09.jpg" interval={3200} />
              </figure>
              <figure className="lp-pins__ph lp-pins__ph--2">
                <PinSlot pool={PIN_POOL} start="assets/images/s17.jpg" interval={3900} />
              </figure>
              <figure className="lp-pins__ph lp-pins__ph--3">
                <PinSlot pool={PIN_POOL} start="assets/images/e07.jpg" interval={4500} />
              </figure>
              <figure className="lp-pins__ph lp-pins__ph--4">
                <PinSlot pool={PIN_POOL} start="assets/images/s21.jpg" interval={5200} />
              </figure>
            </div>
            <div className="lp-pins__copy">
              <span className="lp-poster__eyebrow">Bègles · Bordeaux · Bassin d&rsquo;Arcachon</span>
              <h1 className="lp-pins__title">Vos souvenirs,<br /><em>capturés à jamais.</em></h1>
              <div className="lp-poster__actions">

    /* ── CONFIG STRIPE + API ──────────────────────────────────────── */
    // Remplacer avec votre vraie clé publique Stripe (pk_live_... ou pk_test_...)
    const STRIPE_PK = 'pk_live_51ThxWVPaHGxQhve8Ld1V1kmRTANFUO5Hi8yJwYrYaAtPvNPAKRzLcb54kPJIXhJ5BrYFtThWfpSU4KkVM0JzUMSi00hFzh3xa0';
    // URL du Cloudflare Worker après déploiement
    const API_BASE  = 'https://amour-et-lumiere-api.VOTRE_SUBDOMAIN.workers.dev';

    /* ── BOOKING MODAL (wizard 5 étapes) ────────────────────────── */
    function BookingModal({ open, onClose }) {
      const STEPS = ['Formule','Prestation','Pack','Coordonnées','Paiement'];
      const empty = {
        step:0, done:false, formule:null, prest:null, packIdx:null, bw:false,
        contact:{ prenom:'', nom:'', email:'', tel:'', message:'' },
        payChoice:'total', processing:false, cardComplete:false, payError:null,
      };
      const [s, setS] = React.useState(empty);
      const set = patch => setS(prev => ({ ...prev, ...patch }));
      const setContact = (k, v) => setS(prev => ({ ...prev, contact: { ...prev.contact, [k]:v } }));

      const stripeRef   = React.useRef(null);
      const cardRef     = React.useRef(null);
      const cardElemRef = React.useRef(null);

      // Réinitialiser à la fermeture
      React.useEffect(() => {
        if (!open) {
          const t = setTimeout(() => {
            setS(empty);
            if (cardElemRef.current) { cardElemRef.current.destroy(); cardElemRef.current = null; }
          }, 220);
          return () => clearTimeout(t);
        }
      }, [open]);

      // Monter le CardElement quand on arrive à l'étape paiement
      React.useEffect(() => {
        if (!open || s.step !== 4 || s.done) return;
        const t = setTimeout(() => {
          if (!cardRef.current || cardElemRef.current) return;
          if (!stripeRef.current) stripeRef.current = window.Stripe(STRIPE_PK);
          const elements = stripeRef.current.elements();
          const card = elements.create('card', {
            hidePostalCode: true,
            style: {
              base: {
                fontFamily: "'Mulish', system-ui, sans-serif",
                fontSize: '16px', color: '#26241F',
                '::placeholder': { color: '#8B8374' },
              },
              invalid: { color: '#A8503E' },
            },
          });
          card.mount(cardRef.current);
          card.on('change', e => set({ cardComplete: e.complete, payError: e.error?.message || null }));
          cardElemRef.current = card;
        }, 60);
        return () => {
          clearTimeout(t);
          if (cardElemRef.current) { cardElemRef.current.destroy(); cardElemRef.current = null; }
        };
      }, [open, s.step, s.done]);

      React.useEffect(() => {
        const onKey = e => { if (e.key === 'Escape') onClose(); };
        if (open) document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      if (!open) return null;

      const FORMULES = {
        studio:    { name:'En studio',    sub:'À Bègles, au flash',     from:'dès 49 €', icon:<Icons.Camera />, packs:PACKS_STUDIO },
        exterieur: { name:'En extérieur', sub:'Lieu au choix · nature', from:'dès 99 €', icon:<Icons.Sun />,    packs:PACKS_EXTERIEUR },
      };
      const f = s.formule ? FORMULES[s.formule] : null;
      const packs = f ? f.packs : [];
      const pack = s.packIdx != null ? packs[s.packIdx] : null;
      const prestObj = PRESTATIONS.find(p => p.id === s.prest);

      const priceNum = pack ? parseInt(String(pack.price).replace(/[^0-9]/g, ''), 10) : 0;
      const total = priceNum + (s.bw ? 10 : 0);
      const due = s.payChoice === 'acompte' ? Math.round(total * 0.3) : total;
      const fmt = n => n.toLocaleString('fr-FR') + ' €';
      const emailOk = /.+@.+\..+/.test(s.contact.email);

      const canNext = [
        !!s.formule,
        !!s.prest,
        s.packIdx != null,
        !!(s.contact.prenom.trim() && emailOk && s.contact.tel.trim()),
        s.cardComplete,
      ][s.step];

      const next = () => set({ step: Math.min(STEPS.length - 1, s.step + 1) });
      const back = () => set({ step: Math.max(0, s.step - 1) });

      const pay = async () => {
        set({ processing:true, payError:null });
        try {
          // 1. Créer le PaymentIntent côté serveur
          const res = await fetch(`${API_BASE}/create-payment-intent`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              amount: due * 100,
              currency: 'eur',
              metadata: {
                formule: s.formule,
                prest:   prestObj?.title || s.prest,
                pack:    pack?.label || '',
                bw:      s.bw ? 'oui' : 'non',
                nom:     `${s.contact.prenom} ${s.contact.nom}`.trim(),
                email:   s.contact.email,
                tel:     s.contact.tel,
              },
            }),
          });
          if (!res.ok) throw new Error('Erreur serveur, veuillez réessayer.');
          const { clientSecret, error: serverError } = await res.json();
          if (serverError) throw new Error(serverError);

          // 2. Confirmer le paiement avec Stripe.js
          const { paymentIntent, error: stripeError } =
            await stripeRef.current.confirmCardPayment(clientSecret, {
              payment_method: {
                card: cardElemRef.current,
                billing_details: {
                  name:  `${s.contact.prenom} ${s.contact.nom}`.trim(),
                  email: s.contact.email,
                  phone: s.contact.tel,
                },
              },
            });
          if (stripeError) throw new Error(stripeError.message);

          // 3. Envoyer les emails de confirmation
          await fetch(`${API_BASE}/send-confirmation`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              paymentIntentId: paymentIntent.id,
              contact: s.contact,
              formule: s.formule,
              prest:   prestObj?.title,
              pack:    pack?.label,
              total:   fmt(due),
              bw:      s.bw,
            }),
          });

          set({ processing:false, done:true });
        } catch(e) {
          set({ processing:false, payError: e.message });
        }
      };

      const helperText = [
        'En studio chez nous à Bègles, ou en extérieur sur le lieu de votre choix.',
        'Le type de séance qui vous ressemble.',
        'La séance et vos photos retouchées sont comprises dans le prix.',
        'Pour confirmer votre réservation et vous envoyer votre galerie.',
        'Paiement sécurisé. Vous recevez votre reçu par email.',
      ][s.step];

      return (
        <div className="lp-modal" role="dialog" aria-modal="true" aria-label="Réserver une séance" onClick={onClose}>
          <div className="lp-modal__card" onClick={e => e.stopPropagation()}>
            <button className="lp-modal__close" onClick={onClose} aria-label="Fermer">&times;</button>

            {s.done ? (
              <div className="lp-bk-confirm">
                <span className="lp-bk-confirm__icon"><Icons.Check /></span>
                <h3 className="lp-bk-confirm__title">C&rsquo;est réservé&nbsp;!</h3>
                <p className="lp-bk-confirm__lead">
                  Merci {s.contact.prenom || ''}. Un email de confirmation vient d&rsquo;être envoyé
                  à <strong>{s.contact.email}</strong> — on vous recontacte pour caler la date ensemble.
                </p>
                <div className="lp-bk-recap">
                  <div className="lp-bk-recap__row">
                    <span className="lp-bk-recap__k">Formule</span>
                    <span className="lp-bk-recap__v">{f && f.name}</span>
                  </div>
                  <div className="lp-bk-recap__row">
                    <span className="lp-bk-recap__k">Prestation</span>
                    <span className="lp-bk-recap__v">{prestObj && prestObj.title}</span>
                  </div>
                  <div className="lp-bk-recap__row">
                    <span className="lp-bk-recap__k">Pack</span>
                    <span className="lp-bk-recap__v">{pack && pack.label}{s.bw ? ' · noir & blanc' : ''}</span>
                  </div>
                  <div className="lp-bk-recap__row lp-bk-recap__row--total">
                    <span className="lp-bk-recap__k">{s.payChoice === 'acompte' ? 'Acompte réglé' : 'Réglé'}</span>
                    <span className="lp-bk-recap__v">{fmt(due)}</span>
                  </div>
                  {s.payChoice === 'acompte' && (
                    <div className="lp-bk-recap__row">
                      <span className="lp-bk-recap__k">Solde le jour J</span>
                      <span className="lp-bk-recap__v">{fmt(total - due)}</span>
                    </div>
                  )}
                </div>
                <div className="lp-bk__foot lp-bk__foot--center">
                  <Button variant="primary" size="lg" onClick={onClose}>Parfait, merci&nbsp;!</Button>
                </div>
              </div>
            ) : (
              <>
                <div className="lp-bk__head">
                  <span className="al-eyebrow">Réservation</span>
                  <h3 className="lp-bk__title">
                    {['Votre formule','Votre prestation','Votre pack','Vos coordonnées','Paiement'][s.step]}
                  </h3>
                  <p className="lp-bk__helper">{helperText}</p>
                </div>

                <div className="lp-bk__progress">
                  <div className="lp-bk__progress-meta">
                    <span>Étape {s.step + 1} / {STEPS.length}</span>
                    <span>{STEPS[s.step]}</span>
                  </div>
                  <div className="lp-bk__progress-track">
                    <div className="lp-bk__progress-fill"
                         style={{ width: ((s.step + 1) / STEPS.length * 100) + '%' }} />
                  </div>
                </div>

                <div className="lp-bk__body">
                  {/* Step 0 — Formule */}
                  {s.step === 0 && (
                    <div className="lp-bk-opts">
                      {['studio','exterieur'].map(key => {
                        const o = FORMULES[key];
                        const on = s.formule === key;
                        return (
                          <button key={key} type="button"
                            className={'lp-bk-opt' + (on ? ' lp-bk-opt--on' : '')}
                            onClick={() => set({ formule:key, packIdx:null })}>
                            <span className="lp-bk-opt__icon">{o.icon}</span>
                            <span className="lp-bk-opt__name">{o.name}</span>
                            <span className="lp-bk-opt__sub">{o.sub}</span>
                            <span className="lp-bk-opt__from">{o.from}</span>
                          </button>
                        );
                      })}
                    </div>
                  )}

                  {/* Step 1 — Prestation */}
                  {s.step === 1 && (
                    <div className="lp-bk-tiles">
                      {PRESTATIONS.map(p => {
                        const on = s.prest === p.id;
                        return (
                          <button key={p.id} type="button"
                            className={'lp-bk-tile' + (on ? ' lp-bk-tile--on' : '')}
                            onClick={() => set({ prest:p.id })}>
                            <img src={p.img} alt={p.title} />
                            <span className="lp-bk-tile__lbl">{p.title}</span>
                            {on && <span className="lp-bk-tile__check"><Icons.Check /></span>}
                          </button>
                        );
                      })}
                    </div>
                  )}

                  {/* Step 2 — Pack */}
                  {s.step === 2 && (
                    <>
                      <div className="lp-bk-packs">
                        {packs.map((p, i) => {
                          const on = s.packIdx === i;
                          return (
                            <button key={i} type="button"
                              className={'lp-bk-pack' + (on ? ' lp-bk-pack--on' : '')}
                              onClick={() => set({ packIdx:i })}>
                              <span className="lp-bk-pack__radio" aria-hidden="true" />
                              <span className="lp-bk-pack__label">
                                {p.label}{p.extra && <em>{p.extra}</em>}
                              </span>
                              <span className="lp-bk-pack__price">{p.price}</span>
                            </button>
                          );
                        })}
                      </div>
                      <button type="button"
                        className={'lp-bk-bw' + (s.bw ? ' lp-bk-bw--on' : '')}
                        onClick={() => set({ bw:!s.bw })}>
                        <span className="lp-bk-bw__check"><Icons.Check /></span>
                        <span className="lp-bk-bw__txt">Option noir &amp; blanc sur toutes vos photos</span>
                        <span className="lp-bk-bw__price">+&nbsp;10&nbsp;€</span>
                      </button>
                    </>
                  )}

                  {/* Step 3 — Coordonnées */}
                  {s.step === 3 && (
                    <div className="lp-bk-form">
                      <TextField label="Prénom" placeholder="Votre prénom" required
                        value={s.contact.prenom} onChange={e => setContact('prenom', e.target.value)} />
                      <TextField label="Nom" placeholder="Votre nom"
                        value={s.contact.nom} onChange={e => setContact('nom', e.target.value)} />
                      <div className="lp-bk-form__full">
                        <TextField label="Email" type="email" icon={<Icons.Mail />} required
                          placeholder="vous@email.com" hint="Pour recevoir votre confirmation et votre galerie"
                          error={s.contact.email && !emailOk ? 'Email invalide' : undefined}
                          value={s.contact.email} onChange={e => setContact('email', e.target.value)} />
                      </div>
                      <div className="lp-bk-form__full">
                        <TextField label="Téléphone" type="tel" icon={<Icons.Phone />} required
                          placeholder="06 12 34 56 78"
                          value={s.contact.tel} onChange={e => setContact('tel', e.target.value)} />
                      </div>
                      <div className="lp-bk-form__full">
                        <TextField label="Un message (optionnel)" multiline
                          placeholder="Vos disponibilités, le nombre de personnes, une envie particulière…"
                          value={s.contact.message} onChange={e => setContact('message', e.target.value)} />
                      </div>
                    </div>
                  )}

                  {/* Step 4 — Paiement */}
                  {s.step === 4 && (
                    <>
                      <div className="lp-bk-seg">
                        {[['total','Tout régler',total],['acompte','Acompte 30 %',Math.round(total * 0.3)]].map(([key,lbl,amt]) => (
                          <button key={key} type="button"
                            className={'lp-bk-seg__btn' + (s.payChoice === key ? ' lp-bk-seg__btn--on' : '')}
                            onClick={() => set({ payChoice:key })}>
                            <span className="lp-bk-seg__lbl">{lbl}</span>
                            <span className="lp-bk-seg__amt">{fmt(amt)}</span>
                          </button>
                        ))}
                      </div>
                      <div className="lp-bk-summary">
                        <span className="lp-bk-summary__lbl">À régler aujourd&rsquo;hui</span>
                        <span className="lp-bk-summary__amt">{fmt(due)}</span>
                      </div>
                      {s.payChoice === 'acompte' && (
                        <p className="lp-bk-note">Solde de {fmt(total - due)} à régler le jour de la séance.</p>
                      )}
                      <div ref={cardRef} className="lp-stripe-element" />
                      {s.payError && <p className="lp-bk-error">{s.payError}</p>}
                      <p className="lp-bk-secure"><Icons.Shield /> Paiement chiffré par Stripe · aucune donnée bancaire conservée</p>
                    </>
                  )}
                </div>

                <div className="lp-bk__foot">
                  {s.step > 0
                    ? <button type="button" className="lp-bk__back" onClick={back} disabled={s.processing}>Retour</button>
                    : <span />}
                  {s.step < STEPS.length - 1 ? (
                    <Button variant="primary" size="lg" iconRight={<Icons.Arrow />}
                      onClick={next} disabled={!canNext}>
                      Continuer
                    </Button>
                  ) : (
                    <Button variant="primary" size="lg"
                      onClick={pay} disabled={!canNext || s.processing}>
                      {s.processing ? 'Paiement…' : 'Payer ' + fmt(due)}
                    </Button>
                  )}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ── APP ROOT ─────────────────────────────────────────────────── */
    function App() {
      const [booking, setBooking] = React.useState(false);
      const openBooking  = React.useCallback(() => setBooking(true),  []);
      const closeBooking = React.useCallback(() => setBooking(false), []);
      return (
        <div className="al-scroll">
          <Header onBook={openBooking} />
          <main>
            <Hero onBook={openBooking} />
            <OfferSection onBook={openBooking} />
            <GallerySection />
            <PricingSection onBook={openBooking} />
            <PrestationsSection />
            <AboutSection />
            <StudioAddressSection />
            <ReviewsSection />
            <BookingCTA onBook={openBooking} />
          </main>
          <Footer />
          <BookingModal open={booking} onClose={closeBooking} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
