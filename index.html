<body>

  <script type="text/babel">
    // ─── useTweaks (minimal — tweaks panel not shown in production) ───────────
    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
      }, []);
      return [values, setTweak];
    }
    // Stub tweaks panel — never shown in production (no __activate_edit_mode posted)
    function TweaksPanel() { return null; }
    function TweakSection() { return null; }
    function TweakSelect() { return null; }
    function TweakColor() { return null; }
    function TweakToggle() { return null; }

    // ─── Nav ─────────────────────────────────────────────────────────────────
    function Nav({ ctaLabel = 'Réserver un appel' }) {
      const [scrolled, setScrolled] = React.useState(false);
      const [open, setOpen] = React.useState(false);
      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 24);
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [open]);
      const go = (id) => (e) => {
        e.preventDefault(); setOpen(false);
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };
      return (
        <nav className={"nav" + (scrolled ? " scrolled" : "") + (open ? " menu-open" : "")}>
          <div className="container">
            <div className="nav-inner">
              <a className="nav-brand" href="#top" onClick={go('top')}>
                <img className="nav-logo" src="landing/logo-a.png" alt="Arthur Defoin" />
                <span className="brand-text">
                  <span className="name">Arthur Defoin</span>
                  <span className="tag">Publicité Meta · Photographes</span>
                </span>
              </a>
              <div className="nav-links">
                <a onClick={go('simulateur')}>Simulateur</a>
                <a onClick={go('preuves')}>Résultats</a>
                <a onClick={go('mecanisme')}>Méthode</a>
                <a onClick={go('studio')}>Mon studio</a>
                <button className="nav-cta nav-cta-mobile" onClick={go('rappel')}>{ctaLabel}</button>
              </div>
              <button className="nav-cta nav-cta-desktop" onClick={go('rappel')}>{ctaLabel}</button>
              <button className="nav-burger" aria-label="Menu" aria-expanded={open} onClick={() => setOpen(o => !o)}>
                <i data-lucide={open ? 'x' : 'menu'}></i>
              </button>
            </div>
          </div>
        </nav>
      );
    }

    // ─── SideRail ────────────────────────────────────────────────────────────
    function SideRail() {
      const sections = [
        { id: 'top', n: '01' }, { id: 'simulateur', n: '02' },
        { id: 'rappel', n: '03' }, { id: 'preuves', n: '04' },
        { id: 'mecanisme', n: '05' }, { id: 'studio', n: '06' },
      ];
      const [active, setActive] = React.useState('top');
      React.useEffect(() => {
        const onScroll = () => {
          const y = window.scrollY + 200;
          let cur = sections[0].id;
          for (const s of sections) { const el = document.getElementById(s.id); if (el && el.offsetTop <= y) cur = s.id; }
          setActive(cur);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <div className="side-rail" aria-hidden="true">
          {sections.map(s => (
            <a key={s.id} className={active === s.id ? 'active' : ''}
               onClick={e => { e.preventDefault(); const el = document.getElementById(s.id); if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' }); }}>
              {s.n}
            </a>
          ))}
        </div>
      );
    }

    // ─── Hero WOW (Animé — rotating word) ────────────────────────────────────
    function HeroWow({ variant = 'anime' }) {
      const go = (id) => (e) => {
        e.preventDefault();
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };
      const Eyebrow = () => (
        <div className="eyebrow"><span className="rule"></span><span>Publicité Meta pour photographes</span></div>
      );
      const Lede = () => (
        <p className="lede">Je suis photographe et media buyer Meta Ads.<br />Je lance, gère et optimise vos publicités.</p>
      );
      const Actions = () => (
        <div className="hero-actions">
          <a className="btn btn-primary" href="#simulateur" onClick={go('simulateur')}>
            Voir le simulateur <span className="arrow">→</span>
          </a>
        </div>
      );

      if (variant === 'immersif') {
        return (
          <section className="section hero hero-wow hero-immersif" id="top">
            <div className="hero-blob"></div>
            <div className="container">
              <div className="hero-grid">
                <div className="hero-copy">
                  <Eyebrow />
                  <h1><span className="small-lead">Vous photographiez —</span> nous attirons vos <em>clients</em>.</h1>
                  <p className="lede">Je suis photographe, comme vous, et media buyer spécialisé Meta Ads. Pendant que vous êtes derrière l'objectif, vos campagnes travaillent.</p>
                  <Actions />
                  <div className="trust-strip">
                    <span><strong>22</strong> photographes accompagnés</span>
                    <span className="dot"></span><span>France · Belgique · Suisse</span>
                  </div>
                </div>
                <div className="hero-visual">
                  <image-slot id="hero-portrait" shape="rect" fit="cover" class="ph" placeholder="Glissez votre portrait"></image-slot>
                  <div className="float-chip chip-1"><strong>× 4,2</strong><span>ROAS moyen</span></div>
                  <div className="float-chip chip-2"><strong>12 €</strong><span>par lead qualifié</span></div>
                  <div className="float-chip chip-3"><strong>+ 38 %</strong><span>demandes / mois</span></div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      if (variant === 'bento') {
        return (
          <section className="section hero hero-wow hero-bento" id="top">
            <div className="container">
              <div className="bento">
                <div className="bento-cell bento-head">
                  <Eyebrow />
                  <h1><span className="small-lead">Vous photographiez —</span> nous attirons vos <em>clients</em>.</h1>
                  <p className="lede">Media buyer Meta Ads, photographe comme vous. Vos campagnes remplissent votre agenda pendant que vous shootez.</p>
                  <Actions />
                </div>
                <div className="bento-cell bento-photo">
                  <image-slot id="hero-portrait" shape="rect" fit="cover" class="ph" placeholder="Glissez votre portrait"></image-slot>
                </div>
                <div className="bento-cell bento-stat"><strong>× 4,2</strong><span>ROAS moyen constaté</span></div>
                <div className="bento-cell bento-stat alt"><strong>12 €</strong><span>coût par lead qualifié</span></div>
                <div className="bento-cell bento-cta">
                  <span className="bento-cta-lbl">Votre retour sur investissement ?</span>
                  <a className="btn" href="#simulateur" onClick={go('simulateur')}>Lancer le simulateur <span className="arrow">→</span></a>
                </div>
              </div>
            </div>
          </section>
        );
      }

      // Default: Animé
      const words = ['prospects', 'clients', 'réservations', 'prospects'];
      return (
        <section className="section hero hero-wow hero-anime" id="top">
          <div className="hero-halo"></div>
          <div className="container">
            <div className="hero-center">
              <Eyebrow />
              <h1>
                <span className="small-lead">Vous photographiez —</span>
                nous attirons vos&nbsp;
                <span className="rotator"><ul>{words.map((w, i) => <li key={i}>{w}</li>)}</ul></span>
              </h1>
              <Lede />
              <Actions />
            </div>
          </div>
        </section>
      );
    }

    // ─── Schema ───────────────────────────────────────────────────────────────
    function Schema() {
      const steps = [
        { ico: 'camera', step: '1', title: 'Vous photographiez', sub: 'Vous faites ce que vous faites de mieux.' },
        { ico: 'megaphone', step: '2', title: 'Je place vos images', sub: 'Campagnes Meta ciblées sur les bons profils.' },
        { ico: 'users', step: '3', title: 'Des prospects qualifiés', sub: 'Les bonnes personnes vous écrivent.' },
        { ico: 'trending-up', step: '4', title: 'Votre CA augmente', sub: 'Automatiquement, mois après mois.', payoff: true },
      ];
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return (
        <section className="section schema" id="mecanisme">
          <div className="container">
            <div className="schema-head">
              <div className="eyebrow"><span className="rule"></span><span className="num">05</span><span>Le mécanisme</span></div>
              <h2>Vous photographiez. <em>Le reste tourne tout seul.</em></h2>
              <p className="lede">Pas de tunnel compliqué : quatre temps, et une boucle qui s'entretient d'elle-même pendant que vous êtes derrière l'objectif.</p>
            </div>
            <div className="schema-flow">
              {steps.map((s, i) => (
                <React.Fragment key={s.step}>
                  <div className={"node" + (s.payoff ? " payoff" : "")}>
                    <div className="node-badge"><i data-lucide={s.ico}></i></div>
                    <div className="node-step">{s.step}</div>
                    <div className="node-title">{s.title}</div>
                    <div className="node-sub">{s.sub}</div>
                  </div>
                  {i < steps.length - 1 && (
                    <div className="connector" style={{ '--d': i * 0.5 + 's' }}>
                      <span className="dot"></span>
                      <i data-lucide="chevron-right"></i>
                    </div>
                  )}
                </React.Fragment>
              ))}
            </div>
            <div className="schema-loop">
              <span className="loop-line"></span>
              <span className="loop-chip">
                <i data-lucide="refresh-cw"></i>
                En continu — pendant que vous photographiez
              </span>
              <span className="loop-line"></span>
            </div>
          </div>
        </section>
      );
    }

        [{d:6,ferie:'Lundi de Pâques'},{d:7,ev:[['15:30','Oceane','Bizet'],['18:00','Lauriane','Coulon']]},{d:8,ev:[['11:00','Daniela','Santos'],['17:00','Clara','Vasseur']]},{d:9},{d:10,ev:[['11:00','Joana','Pouvreau'],['16:00','Sophie','Marchand']]},{d:11,ev:[['10:00','Prescilia','Da costa'],['14:00','Melinda','Da costa'],['17:00','Mélanie','Focqueu']]},{d:12,ev:[['11:00','Marine','Minard'],['16:00','Lorie','Lorente']]}],
        [{d:13,ev:[['11:00','Ousmane','Dramé'],['17:00','Ravaka','Razafindra']]},{d:14,ev:[['16:00','Estelle','Heullant'],['18:00','Fanny','Schalk']]},{d:15,ev:[['11:00','Kaoutar','Kssir'],['16:00','Isabelle','Brice']]},{d:16},{d:17,ev:[['15:30','Laure','Martins']]},{d:18,ev:[['10:00','Bérengère','Simon'],['13:00','Inès','Bonnet'],['16:00','Manon','Delaunay']]},{d:19,ev:[['11:00','Alexia','Souza s.'],['15:30','Capucine','Reboul']]}],
        [{d:20,ev:[['11:00','Marie-Louise','Salomon'],['17:00','Laetitia','Gaillard']]},{d:21,ev:[['14:00','Sébastian','Billard'],['16:00','Bocar','Sow']]},{d:22,ev:[['11:00','Laëtitia','Verraleweck'],['14:00','Emanuela','Haxhi']]},{d:23},{d:24,ev:[['15:00','Nadia','Ali cherif']]},{d:25,ev:[['10:00','Pauline','Marty'],['12:00','Chloé','Perrin'],['15:00','Théo','Roussel']]},{d:26,ev:[['11:00','Léna','Fontaine'],['16:00','Maël','Guérin']]}],

        {src:'landing/assets/studio-soeurs.jpg',alt:'Deux sœurs au studio'},
        {src:'landing/assets/studio-couple.jpg',alt:'Séance couple'},
        {src:'landing/assets/studio-nouveaune1.jpg',alt:'Nouveau-né'},
        {src:'landing/assets/studio-garcon.jpg',alt:'Portrait enfant'},
        {src:'landing/assets/studio-maman.jpg',alt:'Maman et son bébé'},
        {src:'landing/assets/studio-bebe-bow.jpg',alt:'Bébé en séance'},
        {src:'landing/assets/studio-nouveaune2.jpg',alt:'Nouveau-né'},
        {src:'landing/assets/studio-papa.jpg',alt:'Papa et son bébé'},
      ];
      return (
        <section className="section studio" id="studio">
          <div className="container">
            <div className="studio-inner">
              <div className="studio-head">
                <div className="eyebrow"><span className="rule"></span><span className="num">06</span><span>LE STUDIO AMOUR ET LUMIÈRE</span></div>
                <h2>Je connais votre métier —<br /><em>je le vis aussi</em>.</h2>
              </div>
              <div className="studio-gallery">
                <img className="studio-logo-top" src="landing/assets/amour-lumiere-logo.png" alt="Amour et Lumière" />
                <div className="studio-portrait-wrap">
                  <img className="studio-portrait" src="landing/assets/arthur-studio.jpg" alt="Arthur, photographe au studio Amour et Lumière" />
                </div>
                <div className="studio-contact">
                  {photos.map((p,i) => (
                    <figure className="contact-item" key={i}><img src={p.src} alt={p.alt} /></figure>

                </p>
                <div className="studio-stats" style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'2px', flexWrap:'nowrap'}}>
                  <div className="stat" style={{minWidth:0}}><span className="num" style={{fontSize:'clamp(24px,6vw,48px)'}}>+ <em>45</em></span><span className="lbl" style={{fontSize:'clamp(9px,2.4vw,11px)', maxWidth:'none'}}>résa/mois</span></div>

                  <div className="stat" style={{minWidth:0}}><span className="num" style={{fontSize:'clamp(24px,6vw,48px)'}}><em>10</em>&nbsp;%</span><span className="lbl" style={{fontSize:'clamp(9px,2.4vw,11px)', maxWidth:'none'}}>→ bouche à oreille</span></div>
                </div>
                <p className="studio-sign">«&nbsp;Je ne vous vends pas une méthode théorique. Je vous applique celle qui remplit <strong>notre agenda</strong>.&nbsp;»</p>
              </div>
            </div>

            <div className="studio-agenda">
              <div className="agenda-head">
                <div className="eyebrow"><span className="rule"></span><span>Notre agenda — avril 2026</span></div>
                <p className="agenda-sub">Voici une vraie capture de notre planning. Chaque créneau&nbsp;= une séance réservée, presque toutes venues de la publicité Meta.</p>
              </div>
              <div className="agenda-cal" role="table" aria-label="Agenda avril 2026">
                <div className="agenda-dows" role="row">
                  {jours.map(j => <span className="dow" key={j} role="columnheader">{j}</span>)}
                </div>
                <div className="agenda-weeks">
                  {semaines.map((sem, wi) => (
                    <div className="agenda-week" role="row" key={wi}>
                      {sem.map((cell, ci) => (
                        <div className={'agenda-cell'+(ci>=5?' weekend':'')+(cell.d==null?' muted':'')} role="cell" key={ci}>
                          {cell.d!=null && <span className="cell-day">{cell.d}</span>}

                            </span>

        </section>
      );
    }

    // ─── Bénéfices ────────────────────────────────────────────────────────────
    function Dot() {
      return (
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <polyline points="2.5,7.5 5.5,10.5 11.5,3.5" />
        </svg>
      );
    }
    function Benefices() {
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

        { n:'01', icon:'user-round-search', title:'Des prospects qualifiés', desc:"Des photographes intéressés laissent leurs coordonnées via un formulaire. Vous recevez des leads chauds — déjà séduits par vos images, prêts à parler d'un shooting.", list:['Leads reçus par e-mail ou SMS','Ciblage local ou national','Vous rappelez, vous closez'], tag:'Idéal pour les prestations mariage ' },
        { n:'02', icon:'calendar-check', title:'Des réservations automatiques', desc:"Vous proposez des séances gratuites ? Je mets en place un tunnel de vente : les prospects réservent eux-mêmes leur créneau et deviennent vos clients, sans intervention de votre part.", list:['Tunnel de réservation complet','Agenda qui se remplit seul','Conversion en vente à la séance'], tag:'Idéal si vous avez ou voulez faire des réservations gratuites' },

      ];
      return (
        <section className="section" id="benefices">
          <div className="container">
            <div className="section-head">
              <div>
                <div className="eyebrow"><span className="rule"></span><span className="num">07</span><span>OBJECTIFS</span></div>
                <h2>Trois façons<br /><em>de remplir votre agenda</em>.</h2>
              </div>
              <p className="lede">La publicité Meta n'est pas une dépense — c'est un investissement que l'on choisit selon votre objectif. On définit ensemble lequel de ces trois leviers sert le mieux votre studio.</p>
            </div>
            <div className="benefices-grid">
              {items.map(b => (
                <div className="benefice" key={b.n}>

    // ─── Simulateur ───────────────────────────────────────────────────────────
    const CPL = 12, CPR = 20, TAUX_ANNULATION = 25, PANIER_SEUIL = 300, BUDGET_MIN = 400, BUDGET_MAX = 4000, BUDGET_DEFAUT = 800;
    const SIM_SPECIALITES = ['Mariage','Studio','Extérieur'];
    const convForSpec = (s, cart) => {
      if (s !== 'Mariage') return 30;
      // Linear: 10% at 1500€ → 2% at 4500€, clamped
      const ratio = Math.max(0, Math.min(1, (cart - 1500) / 3000));
      return Math.round(10 - ratio * 5);
    };
    const PANIER_PAR_SPEC = { Mariage: 1500 };
    const panierForSpec = s => PANIER_PAR_SPEC[s] ?? 150;
    function repartitionBudget(B) {
      let abonnement, pub;
      if (B <= 1000) { abonnement = 0.5*B-10; pub = 0.5*B+10; }
      else { abonnement = 490+0.10*(B-1000); pub = B-abonnement; }
      return { abonnement, pub };
    }
    function useCounterSim(value, duration=480) {
      const [display, setDisplay] = React.useState(value);
      const ref = React.useRef({from:value,to:value,start:0});
      React.useEffect(() => {
        ref.current = {from:display,to:value,start:performance.now()};
        let raf;
        const tick = t => {
          const {from,to,start} = ref.current;
          const k = Math.min(1,(t-start)/duration);
          const eased = 1-Math.pow(1-k,3);
          setDisplay(from+(to-from)*eased);
          if (k<1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [value]);
      return display;
    }
    const fmtEUR = n => new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(n))+' €';
    const fmtX = n => '× '+new Intl.NumberFormat('fr-FR',{minimumFractionDigits:1,maximumFractionDigits:1}).format(n);
    const fmtInt = n => new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(n));
    function SimSlider({value,min,max,step=1,onChange,ticks}) {
      const trackRef = React.useRef(null);
      const pct = (value-min)/(max-min)*100;

      const valueFromPointer = (e) => {
        const rect = trackRef.current.getBoundingClientRect();
        const clientX = e.clientX;
        const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        const raw = min + ratio * (max - min);
        const stepped = Math.round(raw / step) * step;
        return Math.max(min, Math.min(max, stepped));
      };

      const onPointerDown = (e) => {
        e.preventDefault();
        trackRef.current.setPointerCapture(e.pointerId);
        onChange(valueFromPointer(e));
      };

      const onPointerMove = (e) => {
        if (!trackRef.current.hasPointerCapture(e.pointerId)) return;
        onChange(valueFromPointer(e));
      };

      return (
        <div>
          <div className="sim-slider" ref={trackRef}
               onPointerDown={onPointerDown}
               onPointerMove={onPointerMove}
               style={{touchAction:'none', userSelect:'none'}}>
            <div className="sim-track"><div className="sim-fill" style={{width:pct+'%'}}></div></div>
            <div className="sim-thumb" style={{left:pct+'%'}}></div>
          </div>
          {ticks && <div className="sim-ticks">{ticks.map((t,i) => <span key={i}>{t}</span>)}</div>}
        </div>
      );
    }
    function Simulateur() {

        const revenue = clients*cart;
        const benefice = revenue-budget;
        const roas = budget > 0 ? revenue/budget : 0;
        return {abonnement,pub,volume,clients,revenue,benefice,roas};
      }, [mode,cart,conv,budget]);
      const [showDetail, setShowDetail] = React.useState(false);

  <!-- Meta Pixel — conversion tracking -->
  <script>
    (function () {
      var fire = function (name, params) { if (typeof fbq === 'function') fbq('track', name, params || {}); };
      var checkoutFired = false;
      document.addEventListener('click', function (e) {
        var a = e.target.closest && e.target.closest('a[href="#rappel"]');
        if (a && !checkoutFired) { checkoutFired = true; fire('InitiateCheckout', { content_name: 'Reservation appel' }); }
      }, true);
      var vcFired = false;
      var tries = 0;
      var poll = setInterval(function () {
        var sim = document.getElementById('simulateur');
        if (sim && 'IntersectionObserver' in window) {
          clearInterval(poll);
          new IntersectionObserver(function (entries) {
            entries.forEach(function (en) { if (en.isIntersecting && !vcFired) { vcFired = true; fire('ViewContent', { content_name: 'Simulateur ROI' }); } });
          }, { threshold: 0.4 }).observe(sim);
        } else if (++tries > 40) clearInterval(poll);
      }, 250);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.event === 'calendly.event_scheduled') fire('Lead', { content_name: 'Appel decouverte reserve' });
      });
    })();
  </script>
</body>
