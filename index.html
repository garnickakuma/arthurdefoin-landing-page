    // ─── useTweaks (minimal — tweaks panel not shown in production) ───────────
    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
      }, []);
      return [values, setTweak];
    }
    // Stub tweaks panel — never shown in production (no __activate_edit_mode posted)
    function TweaksPanel() { return null; }
    function TweakSection() { return null; }
    function TweakSelect() { return null; }
    function TweakColor() { return null; }
    function TweakToggle() { return null; }

    // ─── Nav ─────────────────────────────────────────────────────────────────
    function Nav({ ctaLabel = 'Tester le simulateur' }) {
      const [scrolled, setScrolled] = React.useState(false);
      const [open, setOpen] = React.useState(false);
      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 24);
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [open]);
      const go = (id) => (e) => {
        e.preventDefault(); setOpen(false);
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };
      return (
        <nav className={"nav" + (scrolled ? " scrolled" : "") + (open ? " menu-open" : "")}>
          <div className="container">
            <div className="nav-inner">
              <a className="nav-brand" href="#top" onClick={go('top')}>
                <img className="nav-logo" src="landing/logo-a.png" alt="Arthur Defoin" />
                <span className="brand-text">
                  <span className="name">Arthur Defoin</span>
                  <span className="tag">Publicité Meta · Photographes</span>
                </span>
              </a>
              <div className="nav-links">
                <a onClick={go('simulateur')}>Simulateur</a>
                <a onClick={go('mecanisme')}>Le mécanisme</a>
                <a onClick={go('studio')}>Mon studio</a>
                <a onClick={go('avis')}>Avis</a>
                <button className="nav-cta nav-cta-mobile" onClick={go('simulateur')}>{ctaLabel}</button>
              </div>
              <button className="nav-cta nav-cta-desktop" onClick={go('simulateur')}>{ctaLabel}</button>
              <button className="nav-burger" aria-label="Menu" aria-expanded={open} onClick={() => setOpen(o => !o)}>
                <i data-lucide={open ? 'x' : 'menu'}></i>
              </button>
            </div>
          </div>
        </nav>
      );
    }

    // ─── SideRail ────────────────────────────────────────────────────────────
    function SideRail() {
      const sections = [
        { id: 'top', n: '01' },
        { id: 'simulateur', n: '02' },
        { id: 'mecanisme', n: '03' },
        { id: 'studio', n: '04' },
        { id: 'avis', n: '05' },
      ];
      const [active, setActive] = React.useState('top');
      React.useEffect(() => {
        const onScroll = () => {
          const y = window.scrollY + 200;
          let cur = sections[0].id;
          for (const s of sections) { const el = document.getElementById(s.id); if (el && el.offsetTop <= y) cur = s.id; }
          setActive(cur);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <div className="side-rail" aria-hidden="true">
          {sections.map(s => (
            <a key={s.id} className={active === s.id ? 'active' : ''}
               onClick={e => { e.preventDefault(); const el = document.getElementById(s.id); if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' }); }}>
              {s.n}
            </a>
          ))}
        </div>
      );
    }

    // ─── Schema ───────────────────────────────────────────────────────────────

                {fps.map((fp, i) => (

    // ─── Bénéfices ────────────────────────────────────────────────────────────
    function Dot() {
      return (
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <polyline points="2.5,7.5 5.5,10.5 11.5,3.5" />
        </svg>
      );
    }

    let _simSnapshot = {};

    // ─── Simulateur ───────────────────────────────────────────────────────────
    const CPL = 12, PANIER_SEUIL = 300, PUB_MIN = 100, PUB_MAX = 3500, PUB_DEFAUT = 500;
    const SIM_SPECIALITES = ['Mariage','Studio','Extérieur'];
    const convForSpec = (s, cart) => {
      if (s !== 'Mariage') return 40;
      return 10;
    };
    const PANIER_PAR_SPEC = { Mariage: 1500 };
    const panierForSpec = s => PANIER_PAR_SPEC[s] ?? 200;
    function calcAbo(pub) {
      if (pub <= 390) return 390;
      if (pub <= 490) return pub;
      return 490 + (pub - 490) * 0.15;
    }
    function useCounterSim(value, duration=480) {
      const [display, setDisplay] = React.useState(value);
      const ref = React.useRef({from:value,to:value,start:0});

                <div className="sim-cta-wrap" style={{marginTop:32}}>
                  <button className="btn btn-gold" onClick={() => { if (onDevisClick) onDevisClick(); }}>
                    Demander un devis <span style={{display:'inline-block',transform:'rotate(45deg)',marginLeft:'4px'}}>→</span>
                  </button>
                </div>
              )}

            </div>
          </section>
        </div>
      );
    }

    // ─── Formulaire de contact ────────────────────────────────────────────────
    const ICO_PATHS = {
      video:'Pm22 8-6 4 6 4V8Z|R2,6,14,12,2',
      clock:'C12,12,10|PM12 6 12 12 16 14',
      user:'PM19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2|C12,7,4',
      shield:'PM20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z|Pm9 12 2 2 4-4'
    };
    function Ico({n}) {
      const parts = (ICO_PATHS[n]||'').split('|');
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          {parts.map((p,i) => {
            if (p.startsWith('C')) {const [,x,y,r]=p.split(',');return <circle key={i} cx={x} cy={y} r={r}/>;}
            if (p.startsWith('R')) {const [,x,y,w,h,rx]=p.split(',');return <rect key={i} x={x} y={y} width={w} height={h} rx={rx} ry={rx}/>;}
            return <path key={i} d={p.replace(/^P/,'')} />;
          })}
        </svg>
      );
    }
    function Callback({simData, lpChoice}) {
      const [form, setForm] = React.useState({prenom:'', telephone:'', email:'', lancement:''});
      const [status, setStatus] = React.useState('idle');
      const update = k => e => setForm(f => ({...f, [k]: e.target.value}));
      const fmtN = n => n != null ? Math.round(n) + ' €' : '—';
      const lpLabel = lpChoice === 'need' ? "J'ai besoin d'une landing page" : lpChoice === 'have' ? "J'ai déjà une landing page" : null;

      const submit = async e => {
        e.preventDefault();
        setStatus('sending');
        const sim = simData || {};
        try {
          const res = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              access_key: '8ff579b2-c217-4683-95bf-49ccd0b57c4d',
              subject: `Demande de devis — ${form.prenom} (${sim.spec||'?'}, ${sim.pub||'?'}€ pub)`,
              'Prénom': form.prenom,
              'Email': form.email,
              'Téléphone': form.telephone,
              '— Simulation —': '─────────────',
              'Prestation': sim.spec || '—',
              'Panier moyen': sim.cart ? sim.cart + ' €' : '—',
              'Budget pub': sim.pub ? sim.pub + ' €/mois' : '—',
              'CA estimé': fmtN(sim.revenue),
              'Clients estimés': sim.clients ? Math.round(sim.clients) : '—',
              'Bénéfice estimé': fmtN(sim.benefice),
              'Abonnement': fmtN(sim.abo),
              '— Besoins —': '─────────────',
              'Landing page': lpLabel || '—',
              'Lancement souhaité': form.lancement || '—',
            })
          });
          const data = await res.json();
          setStatus(data.success ? 'success' : 'error');
          if (data.success && typeof fbq === 'function') fbq('track', 'Lead');
        } catch { setStatus('error'); }
      };

      const hasRecap = (simData && simData.pub > 0) || lpChoice;

      return (
        <section className="section callback" id="rappel">
          <div className="container">
            <div className="callback-inner">
              <div>
                <h2>Demande de devis —<br /><em>sans engagement</em></h2>
                <p className="lede">Je vous rappelle pour faire le point sur votre activité et vous proposer une offre sur-mesure. Réponse sous 24h.</p>
                <div className="cb-assur">
                  <span><Ico n="user" /> Réponse sous <strong>24h</strong></span>
                  <span><Ico n="video" /> Appel de <strong>30 min</strong></span>
                  <span><Ico n="shield" /> Aucun <strong>engagement</strong></span>
                </div>
              </div>
              <div className="cb-form">
                {status === 'success' ? (
                  <div className="cform-success">
                    <div className="cform-success-ico">✓</div>
                    <h3>Demande envoyée&nbsp;!</h3>
                    <p>Je vous rappelle dans les 24h. À très vite.</p>
                  </div>
                ) : (
                  <form onSubmit={submit} noValidate>
                    {hasRecap && (
                      <div className="cform-recap">
                        {simData && simData.pub > 0 && (
                          <>
                            <span className="cform-recap-intro">D'après le simulateur vous souhaitez&nbsp;:</span>
                            <ul className="cform-recap-list">
                              <li>Investir <strong>{fmtEUR(simData.pub)}</strong></li>
                              <li>Obtenir <strong>{simData.clients ? Math.round(simData.clients) : '—'} clients</strong></li>
                              <li>Gagner <strong>{simData.revenue ? fmtEUR(simData.revenue) : '—'}</strong></li>
                            </ul>
                          </>
                        )}
                        {lpChoice && (
                          <>
                            <span className="cform-recap-intro" style={{marginTop: simData && simData.pub > 0 ? 12 : 0}}>Landing page&nbsp;:</span>
                            <ul className="cform-recap-list">
                              {lpChoice === 'need' && <li>Créer une landing page qui convertit</li>}
                              {lpChoice === 'have' && <li>J'ai déjà une landing page</li>}
                            </ul>
                          </>
                        )}
                      </div>
                    )}
                    <div className="cform-field">
                      <label className="cform-label">Prénom</label>
                      <input className="cform-input" type="text" required placeholder="Sophie" value={form.prenom} onChange={update('prenom')} />
                    </div>
                    <div className="cform-field">
                      <label className="cform-label">Téléphone</label>
                      <input className="cform-input" type="tel" required placeholder="06 12 34 56 78" value={form.telephone} onChange={update('telephone')} />
                    </div>
                    <div className="cform-field">
                      <label className="cform-label">Email</label>
                      <input className="cform-input" type="email" required placeholder="sophie@studio.fr" value={form.email} onChange={update('email')} />
                    </div>
                    <div className="cform-field">
                      <label className="cform-label">Quand souhaitez-vous lancer vos publicités ?</label>
                      <select className="cform-input cform-select" value={form.lancement} onChange={update('lancement')}>
                        <option value="">— Choisissez —</option>
                        <option value="Dès que possible">Dès que possible</option>
                        <option value="Dans 1 mois">Dans 1 mois</option>
                        <option value="Dans 2-3 mois">Dans 2-3 mois</option>
                        <option value="Dans 6 mois ou plus">Dans 6 mois ou plus</option>
                      </select>
                    </div>
                    {status === 'error' && <p className="cform-error">Une erreur est survenue, réessayez.</p>}
                    <button className="btn btn-gold cform-submit" type="submit" disabled={status==='sending'}>
                      {status==='sending' ? 'Envoi…' : 'Envoyer ma demande de devis →'}
                    </button>
                    <p className="cform-legal">Coordonnées utilisées uniquement pour vous recontacter.</p>
                  </form>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    }
    // ─── Avis ─────────────────────────────────────────────────────────────────

        { name:'Camille', city:'Strasbourg', spec:'Nouveau-né', note:5,

      const row2 = [
        { name:'Manon', city:'Nantes', spec:'Famille', note:5,
          quote:"Mon agenda se remplit même quand je suis en séance. C'est ce qui m'a le plus surprise — le fait que ça tourne sans que j'aie besoin d'être là." },
        { name:'Julien', city:'Genève', spec:'Mariage', note:5,

        { name:'Pierre', city:'Lausanne', spec:'Portrait', note:5,

        { name:'Élodie', city:'Montpellier', spec:'Famille', note:5,

        { name:'Nicolas', city:'Lille', spec:'Studio · Mode', note:5,
          quote:"J'hésitais longtemps à cause du budget. Ce qui m'a décidé c'est de voir les chiffres posés clairement — et dans les faits, ça a suivi." },
        { name:'Sarah', city:'Rennes', spec:'Mariage', note:5,
          quote:"Arthur fait partie de mon équipe comme un prestataire mariage. Il s'adapte aux saisons, ajuste les cibles. Je n'ai plus à me soucier de trouver des clients." },
      ];
      const Card = ({r}) => (
        <div className="avis-card">
          <div className="avis-stars">
            {[...Array(r.note)].map((_,j) => <span key={j} className="avis-star">★</span>)}
          </div>
          <p className="avis-quote">"{r.quote}"</p>
          <div className="avis-author">
            <div className="avis-avatar">{r.name[0]}</div>
            <div className="avis-meta">
              <strong>{r.name[0]}.</strong>
              <span>{r.spec} · {r.city}</span>
            </div>
          </div>
        </div>
      );
      return (
        <section className="section avis-section" id="avis">
          <div className="container">
            <div className="section-head">
              <div>
                <div className="eyebrow"><span className="rule"></span><span className="num">05</span><span>Avis clients</span></div>
                <h2>Ce que disent<br /><em>les photographes</em>.</h2>
              </div>
              <p className="lede">Des photographes de toute la France, Belgique et Suisse qui ont confié leur publicité Meta.</p>
            </div>
          </div>
          <div className="avis-marquee-outer">
            <div className="avis-marquee-row">
              <div className="avis-marquee-track">
                {row1.map((r,i) => <Card key={i} r={r} />)}
                {row1.map((r,i) => <Card key={'b'+i} r={r} />)}
              </div>
            </div>
            <div className="avis-marquee-row avis-marquee-reverse">
              <div className="avis-marquee-track">
                {row2.map((r,i) => <Card key={i} r={r} />)}

    }

    // ─── Footer ───────────────────────────────────────────────────────────────
    function Footer() {
      const go = id => e => { e.preventDefault(); const el = document.getElementById(id); if (el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'}); };
      return (
        <footer className="footer">
          <div className="container">
            <div className="footer-grid">
              <div className="footer-brand">
                <span className="footer-brand-lockup">
                  <img className="footer-logo" src="landing/logo-a.png" alt="Arthur Defoin" />

                </span>

              </div>
              <div>
                <h4>Naviguer</h4>
                <ul>
                  <li><a href="#studio" onClick={go('studio')}>Le studio</a></li>
                  <li><a href="#benefices" onClick={go('benefices')}>Bénéfices</a></li>
                  <li><a href="#simulateur" onClick={go('simulateur')}>Simulateur</a></li>

              </div>

            </div>
          </div>

      );

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [simData, setSimData] = React.useState({});
      const [offreVisible, setOffreVisible] = React.useState(false);
      const [devisVisible, setDevisVisible] = React.useState(false);
      const [lpChoice, setLpChoice] = React.useState(null);
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

      const handleCtaClick = () => {
        setOffreVisible(true);
        setTimeout(() => {
          const el = document.getElementById('offre');
          if (el) window.scrollTo({top: el.offsetTop - 60, behavior: 'smooth'});
        }, 80);
      };

      const handleDevisClick = () => {
        setDevisVisible(true);
        setTimeout(() => {
          const el = document.getElementById('rappel');
          if (el) window.scrollTo({top: el.offsetTop - 60, behavior: 'smooth'});
        }, 80);
      };

      return (
        <div className="page">
          <Nav />
          <SideRail />
          <main>
            <HeroWow variant="anime" />
            <Simulateur onSimChange={setSimData} onCtaClick={handleCtaClick} />
            <Offre visible={offreVisible} lpChoice={lpChoice} onLpChoice={setLpChoice} onDevisClick={handleDevisClick} />
            {devisVisible && <Callback simData={simData} lpChoice={lpChoice} />}
            <Schema />
            <Studio />
            <Avis />
          </main>
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Meta Pixel — conversion tracking -->
  <script>
    (function () {
      var fire = function (name, params) { if (typeof fbq === 'function') fbq('track', name, params || {}); };
      var checkoutFired = false;
      document.addEventListener('click', function (e) {
        var a = e.target.closest && e.target.closest('a[href="#rappel"]');
        if (a && !checkoutFired) { checkoutFired = true; fire('InitiateCheckout', { content_name: 'Reservation appel' }); }
      }, true);
      var vcFired = false;
      var tries = 0;
      var poll = setInterval(function () {
        var sim = document.getElementById('simulateur');
        if (sim && 'IntersectionObserver' in window) {
          clearInterval(poll);
          new IntersectionObserver(function (entries) {
            entries.forEach(function (en) { if (en.isIntersecting && !vcFired) { vcFired = true; fire('ViewContent', { content_name: 'Simulateur ROI' }); } });
          }, { threshold: 0.4 }).observe(sim);
        } else if (++tries > 40) clearInterval(poll);
      }, 250);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.event === 'calendly.event_scheduled') fire('Lead', { content_name: 'Appel decouverte reserve' });
      });
    })();
  </script>
