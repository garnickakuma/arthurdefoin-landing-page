    // ─── useTweaks (minimal — tweaks panel not shown in production) ───────────
    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
      }, []);
      return [values, setTweak];
    }
    // Stub tweaks panel — never shown in production (no __activate_edit_mode posted)
    function TweaksPanel() { return null; }
    function TweakSection() { return null; }
    function TweakSelect() { return null; }
    function TweakColor() { return null; }
    function TweakToggle() { return null; }

    // ─── Nav ─────────────────────────────────────────────────────────────────
    function Nav({ ctaLabel = 'Réserver un appel' }) {
      const [scrolled, setScrolled] = React.useState(false);
      const [open, setOpen] = React.useState(false);
      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 24);
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [open]);
      const go = (id) => (e) => {
        e.preventDefault(); setOpen(false);
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };
      return (
        <nav className={"nav" + (scrolled ? " scrolled" : "") + (open ? " menu-open" : "")}>
          <div className="container">
            <div className="nav-inner">
              <a className="nav-brand" href="#top" onClick={go('top')}>
                <img className="nav-logo" src="landing/logo-a.png" alt="Arthur Defoin" />
                <span className="brand-text">
                  <span className="name">Arthur Defoin</span>
                  <span className="tag">Publicité Meta · Photographes</span>
                </span>
              </a>
              <div className="nav-links">
                <a onClick={go('simulateur')}>Simulateur</a>
                <a onClick={go('mecanisme')}>Méthode</a>
                <a onClick={go('studio')}>Mon studio</a>
                <button className="nav-cta nav-cta-mobile" onClick={go('rappel')}>{ctaLabel}</button>
              </div>
              <button className="nav-cta nav-cta-desktop" onClick={go('rappel')}>{ctaLabel}</button>
              <button className="nav-burger" aria-label="Menu" aria-expanded={open} onClick={() => setOpen(o => !o)}>
                <i data-lucide={open ? 'x' : 'menu'}></i>
              </button>
            </div>
          </div>
        </nav>
      );
    }

    // ─── SideRail ────────────────────────────────────────────────────────────
    function SideRail() {
      const sections = [
        { id: 'top', n: '01' }, { id: 'simulateur', n: '02' },
        { id: 'rappel', n: '03' },
        { id: 'mecanisme', n: '05' }, { id: 'studio', n: '06' },
      ];
      const [active, setActive] = React.useState('top');
      React.useEffect(() => {
        const onScroll = () => {
          const y = window.scrollY + 200;
          let cur = sections[0].id;
          for (const s of sections) { const el = document.getElementById(s.id); if (el && el.offsetTop <= y) cur = s.id; }
          setActive(cur);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <div className="side-rail" aria-hidden="true">
          {sections.map(s => (
            <a key={s.id} className={active === s.id ? 'active' : ''}
               onClick={e => { e.preventDefault(); const el = document.getElementById(s.id); if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' }); }}>
              {s.n}
            </a>
          ))}
        </div>
      );
    }

    // ─── Hero WOW (Animé — rotating word) ────────────────────────────────────
    function HeroWow({ variant = 'anime' }) {
      const go = (id) => (e) => {
        e.preventDefault();
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };
      const Eyebrow = () => (
        <div className="eyebrow"><span className="rule"></span><span>Publicité Meta pour photographes</span></div>
      );
      const Lede = () => (
        <p className="lede">Je suis photographe et media buyer Meta Ads.<br />Je lance, gère et optimise vos publicités.</p>
      );
      const Actions = () => (
        <div className="hero-actions">
          <a className="btn btn-primary" href="#simulateur" onClick={go('simulateur')}>
            Voir le simulateur <span className="arrow">→</span>
          </a>
        </div>
      );

      if (variant === 'immersif') {
        return (
          <section className="section hero hero-wow hero-immersif" id="top">
            <div className="hero-blob"></div>
            <div className="container">
              <div className="hero-grid">
                <div className="hero-copy">
                  <Eyebrow />
                  <h1><span className="small-lead">Vous photographiez —</span> nous attirons vos <em>clients</em>.</h1>
                  <p className="lede">Je suis photographe, comme vous, et media buyer spécialisé Meta Ads. Pendant que vous êtes derrière l'objectif, vos campagnes travaillent.</p>
                  <Actions />
                  <div className="trust-strip">
                    <span><strong>22</strong> photographes accompagnés</span>
                    <span className="dot"></span><span>France · Belgique · Suisse</span>
                  </div>
                </div>
                <div className="hero-visual">
                  <image-slot id="hero-portrait" shape="rect" fit="cover" class="ph" placeholder="Glissez votre portrait"></image-slot>
                  <div className="float-chip chip-1"><strong>× 4,2</strong><span>ROAS moyen</span></div>
                  <div className="float-chip chip-2"><strong>12 €</strong><span>par lead qualifié</span></div>
                  <div className="float-chip chip-3"><strong>+ 38 %</strong><span>demandes / mois</span></div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      if (variant === 'bento') {
        return (
          <section className="section hero hero-wow hero-bento" id="top">
            <div className="container">
              <div className="bento">
                <div className="bento-cell bento-head">
                  <Eyebrow />
                  <h1><span className="small-lead">Vous photographiez —</span> nous attirons vos <em>clients</em>.</h1>
                  <p className="lede">Media buyer Meta Ads, photographe comme vous. Vos campagnes remplissent votre agenda pendant que vous shootez.</p>
                  <Actions />
                </div>
                <div className="bento-cell bento-photo">
                  <image-slot id="hero-portrait" shape="rect" fit="cover" class="ph" placeholder="Glissez votre portrait"></image-slot>
                </div>
                <div className="bento-cell bento-stat"><strong>× 4,2</strong><span>ROAS moyen constaté</span></div>
                <div className="bento-cell bento-stat alt"><strong>12 €</strong><span>coût par lead qualifié</span></div>
                <div className="bento-cell bento-cta">
                  <span className="bento-cta-lbl">Votre retour sur investissement ?</span>
                  <a className="btn" href="#simulateur" onClick={go('simulateur')}>Lancer le simulateur <span className="arrow">→</span></a>
                </div>
              </div>
            </div>
          </section>
        );
      }

      // Default: Animé
      const words = ['prospects', 'clients', 'réservations', 'prospects'];
      return (
        <section className="section hero hero-wow hero-anime" id="top">
          <div className="hero-halo"></div>
          <div className="container">
            <div className="hero-center">
              <Eyebrow />
              <h1>
                <span className="small-lead">Vous photographiez —</span>
                nous attirons vos&nbsp;
                <span className="rotator"><ul>{words.map((w, i) => <li key={i}>{w}</li>)}</ul></span>
              </h1>
              <Lede />
              <Actions />
            </div>
          </div>
        </section>
      );
    }

    // ─── Schema ───────────────────────────────────────────────────────────────
    function Schema() {
      const steps = [
        { ico: 'camera', step: '1', title: 'Vous photographiez', sub: 'Vous faites ce que vous faites de mieux.' },
        { ico: 'megaphone', step: '2', title: 'Je place vos images', sub: 'Campagnes Meta ciblées sur les bons profils.' },
        { ico: 'users', step: '3', title: 'Des prospects qualifiés', sub: 'Les bonnes personnes vous écrivent.' },
        { ico: 'trending-up', step: '4', title: 'Votre CA augmente', sub: 'Automatiquement, mois après mois.', payoff: true },
      ];
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return (
        <section className="section schema" id="mecanisme">
          <div className="container">
            <div className="schema-head">
              <div className="eyebrow"><span className="rule"></span><span className="num">05</span><span>Le mécanisme</span></div>
              <h2>Vous photographiez. <em>Le reste tourne tout seul.</em></h2>
              <p className="lede">Pas de tunnel compliqué : quatre temps, et une boucle qui s'entretient d'elle-même pendant que vous êtes derrière l'objectif.</p>
            </div>
            <div className="schema-flow">
              {steps.map((s, i) => (
                <React.Fragment key={s.step}>
                  <div className={"node" + (s.payoff ? " payoff" : "")}>
                    <div className="node-badge"><i data-lucide={s.ico}></i></div>
                    <div className="node-step">{s.step}</div>
                    <div className="node-title">{s.title}</div>
                    <div className="node-sub">{s.sub}</div>
                  </div>
                  {i < steps.length - 1 && (
                    <div className="connector" style={{ '--d': i * 0.5 + 's' }}>
                      <span className="dot"></span>
                      <i data-lucide="chevron-right"></i>
                    </div>
                  )}
                </React.Fragment>
              ))}
            </div>
            <div className="schema-loop">
              <span className="loop-line"></span>
              <span className="loop-chip">
                <i data-lucide="refresh-cw"></i>
                En continu — pendant que vous photographiez
              </span>
              <span className="loop-line"></span>
            </div>
          </div>
        </section>
      );
    }

                <div className="agenda-weeks">

    // ─── Bénéfices ────────────────────────────────────────────────────────────

    let _simSnapshot = {};

    // ─── Simulateur ───────────────────────────────────────────────────────────
    const CPL = 12, PANIER_SEUIL = 300, PUB_MIN = 100, PUB_MAX = 3500, PUB_DEFAUT = 500;
    const SIM_SPECIALITES = ['Mariage','Studio','Extérieur'];
    const convForSpec = (s, cart) => {
      if (s !== 'Mariage') return 40;
      return 10;
    };
    const PANIER_PAR_SPEC = { Mariage: 1500 };
    const panierForSpec = s => PANIER_PAR_SPEC[s] ?? 200;
    function calcAbo(pub) {
      if (pub <= 390) return 390;
      if (pub <= 490) return pub;
      return 490 + (pub - 490) * 0.15;
    }
    function useCounterSim(value, duration=480) {
      const [display, setDisplay] = React.useState(value);
      const ref = React.useRef({from:value,to:value,start:0});
      React.useEffect(() => {
        ref.current = {from:display,to:value,start:performance.now()};
        let raf;
        const tick = t => {
          const {from,to,start} = ref.current;
          const k = Math.min(1,(t-start)/duration);
          const eased = 1-Math.pow(1-k,3);
          setDisplay(from+(to-from)*eased);
          if (k<1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [value]);
      return display;
    }
    const fmtEUR = n => new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(n))+' €';
    const fmtX = n => '× '+new Intl.NumberFormat('fr-FR',{minimumFractionDigits:1,maximumFractionDigits:1}).format(n);
    const fmtInt = n => new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(n));
    function SimSlider({value,min,max,step=1,onChange,ticks}) {
      const trackRef = React.useRef(null);
      const pct = (value-min)/(max-min)*100;

      const valueFromPointer = (e) => {
        const rect = trackRef.current.getBoundingClientRect();
        const clientX = e.clientX;
        const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        const raw = min + ratio * (max - min);
        const stepped = Math.round(raw / step) * step;
        return Math.max(min, Math.min(max, stepped));
      };

      const onPointerDown = (e) => {
        e.preventDefault();
        trackRef.current.setPointerCapture(e.pointerId);
        onChange(valueFromPointer(e));
      };

      const onPointerMove = (e) => {
        if (!trackRef.current.hasPointerCapture(e.pointerId)) return;
        onChange(valueFromPointer(e));
      };

      return (
        <div>
          <div className="sim-slider" ref={trackRef}
               onPointerDown={onPointerDown}
               onPointerMove={onPointerMove}
               style={{touchAction:'none', userSelect:'none'}}>
            <div className="sim-track"><div className="sim-fill" style={{width:pct+'%'}}></div></div>
            <div className="sim-thumb" style={{left:pct+'%'}}></div>
          </div>
          {ticks && <div className="sim-ticks">{ticks.map((t,i) => <span key={i}>{t}</span>)}</div>}
        </div>
      );
    }
    function Simulateur({onSimChange}) {
      const [spec, setSpec] = React.useState('Studio');
      const [cart, setCart] = React.useState(200);
      const [pub, setPub] = React.useState(PUB_DEFAUT);
      const conv = convForSpec(spec, cart);
      const pickSpec = s => { setSpec(s); setCart(panierForSpec(s)); };

      const result = React.useMemo(() => {
        const abo = calcAbo(pub);
        const volume = pub / CPL;
        const clients = volume * (conv / 100);
        const revenue = clients * cart;
        const benefice = revenue - pub;
        const roas = pub > 0 ? revenue / pub : 0;
        return {abo, volume, clients, revenue, benefice, roas};
      }, [cart, conv, pub]);

      const [showDetail, setShowDetail] = React.useState(false);
      const [editField, setEditField] = React.useState(null);
      const [editVal, setEditVal] = React.useState('');

      const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

      const startEdit = field => {
        setEditField(field);
        if (field === 'pub') setEditVal(String(pub));
        else if (field === 'clients') setEditVal(String(Math.round(result.clients)));
        else setEditVal(String(Math.round(result.revenue)));
      };
      const applyEdit = () => {
        const v = parseFloat(editVal);
        if (!isNaN(v) && v > 0) {
          if (editField === 'pub') setPub(clamp(Math.round(v), PUB_MIN, PUB_MAX));
          else if (editField === 'clients') setPub(clamp(Math.round(v * CPL * 100 / conv), PUB_MIN, PUB_MAX));
          else setPub(clamp(Math.round(v * CPL * 100 / (conv * cart)), PUB_MIN, PUB_MAX));
        }
        setEditField(null);
      };
      const onEditKey = e => { if (e.key === 'Enter') applyEdit(); if (e.key === 'Escape') setEditField(null); };

      const dVolume   = useCounterSim(result.volume);
      const dClients  = useCounterSim(result.clients);
      const dRevenue  = useCounterSim(result.revenue);
      const dBenefice = useCounterSim(result.benefice);
      const dRoas     = useCounterSim(result.roas);
      const dAbo      = useCounterSim(result.abo);

      const maxClients = Math.ceil(PUB_MAX / CPL * conv / 100);
      const minClients = Math.max(1, Math.floor(PUB_MIN / CPL * conv / 100));
      const maxRevenue = Math.ceil(maxClients * cart / 50) * 50;
      const minRevenue = Math.max(50, Math.floor(minClients * cart / 50) * 50);

      const go = id => e => { e.preventDefault(); const el = document.getElementById(id); if (el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'}); };
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      React.useEffect(() => { if (onSimChange) onSimChange({spec, cart, pub, ...result}); }, [spec, cart, pub, result]);

      const triVal = (field, display) => {
        if (editField === field) return (
          <input className="stc-input" type="number" min="1" autoFocus
            value={editVal} onChange={e => setEditVal(e.target.value)}
            onBlur={applyEdit} onKeyDown={onEditKey} />
        );
        return (
          <div className="stc-value" onClick={() => startEdit(field)} title="Cliquer pour modifier">
            <span className="stc-num">{display}</span><span className="stc-edit">✎</span>
          </div>
        );
      };

      return (
        <section className="section" id="simulateur">
          <div className="container">
            <div className="section-head" style={{marginBottom:0}}>
              <div>
                <div className="eyebrow"><span className="rule"></span><span className="num">02</span><span>Simulateur</span></div>
                <h2>Combien de clients <em>souhaitez-vous par mois</em>&nbsp;?</h2>
              </div>
            </div>

            <div className="sim-pre">
              <div className="sim-pre-field">
                <span className="sim-field-lbl">Quelle prestation voulez-vous booster en publicité&nbsp;?</span>
                <div className="sim-chips">
                  {SIM_SPECIALITES.map(s => <button key={s} className={"sim-chip"+(spec===s?" active":"")} onClick={() => pickSpec(s)}>{s}</button>)}
                </div>
              </div>
              <div className="sim-pre-field">
                <span className="sim-field-lbl">Panier moyen par client</span>
                <div className="sim-input-wrap">
                  <input className="sim-input" type="number" min="0" step="10" value={cart}
                    onChange={e => { const v = parseInt(e.target.value,10); setCart(isNaN(v)?0:Math.max(0,v)); }}
                    onFocus={e => e.target.select()} />
                  <span className="sim-input-suffix">€</span>
                </div>
              </div>
            </div>

            <div className="sim-trio">
              <div className="sim-trio-card">
                <span className="stc-label">Budget pub mensuel</span>
                {triVal('pub', fmtInt(pub) + ' €')}
                <div className="stc-slider">
                  <SimSlider value={pub} min={PUB_MIN} max={PUB_MAX} step={50} onChange={setPub}
                    ticks={['100 €','1 800 €','3 500 €']} />
                </div>
                <div className="sim-abo-badge">
                  <i data-lucide="plus-circle"></i>
                  <span><strong>{fmtEUR(dAbo)}</strong> / mois — <span className="sim-abo-sub">Mise en place, Gestion &amp; Optimisation des campagnes</span></span>
                </div>
              </div>

              <div className="sim-trio-card">
                <span className="stc-label">Nouveaux clients</span>
                {triVal('clients', fmtInt(dClients))}
                <div className="stc-slider">
                  <SimSlider value={result.clients} min={minClients} max={maxClients} step={1}
                    onChange={v => setPub(clamp(Math.round(v * CPL * 100 / conv), PUB_MIN, PUB_MAX))}
                    ticks={[String(minClients), String(Math.round(maxClients/2)), String(maxClients)]} />
                </div>
                <span className="stc-sub">{fmtInt(dVolume)} leads&nbsp;· {conv}&nbsp;% conversion</span>
              </div>

              <div className="sim-trio-card sim-trio-card-accent">
                <span className="stc-label">Chiffre d'affaires</span>
                {triVal('revenue', fmtEUR(dRevenue))}
                <div className="stc-slider">
                  <SimSlider value={result.revenue} min={minRevenue} max={maxRevenue} step={50}
                    onChange={v => setPub(clamp(Math.round(v * CPL * 100 / (conv * cart)), PUB_MIN, PUB_MAX))}
                    ticks={[fmtEUR(minRevenue), fmtEUR(Math.round(maxRevenue/2/50)*50), fmtEUR(maxRevenue)]} />
                </div>
                <span className="stc-sub">Bénéfice&nbsp;→ <strong>{fmtEUR(dBenefice)}</strong></span>
              </div>
            </div>

            <button className="sim-toggle-detail" onClick={() => setShowDetail(d => !d)} style={{marginTop:24}}>
              {showDetail ? 'Masquer le détail ↑' : 'Voir le détail ↓'}
            </button>
            {showDetail && (
              <div className="sim-breakdown">
                <div className="sim-row"><span className="k">Leads qualifiés</span><span className="v">{fmtInt(dVolume)}</span></div>
                <div className="sim-row"><span className="k">Prestations signées <em className="k-sub">à {conv}&nbsp;% de conversion</em></span><span className="v">{fmtInt(dClients)}</span></div>
                <div className="sim-row"><span className="k">Chiffre d'affaires</span><span className="v">{fmtEUR(dRevenue)}</span></div>
                <div className="sim-row"><span className="k">Dépense publicitaire</span><span className="v">− {fmtEUR(pub)}</span></div>
                <div className="sim-row"><span className="k">Bénéfice net</span><span className="v"><em>{fmtEUR(dBenefice)}</em></span></div>
                <div className="sim-row"><span className="k">Retour sur investissement (ROAS)</span><span className="v"><em>{fmtX(dRoas)}</em></span></div>
                <div className="sim-row sim-row-abo"><span className="k">+ Abonnement <em className="k-sub">hors projections</em></span><span className="v">{fmtEUR(dAbo)}</span></div>
              </div>
            )}
            <div className="sim-cta-wrap">
              <a className="btn btn-gold" href="#tunnel" onClick={go('tunnel')}>Je veux gagner ces clients <span className="arrow">→</span></a>
            </div>
          </div>
        </section>
      );

    // ─── Tunnel de vente ─────────────────────────────────────────────────────
    function Tunnel({onTunnelChange}) {

      const allChecked = pubChecked && lpChoice !== null && readyChecked;
      const step2Ref = React.useRef(null);
      const step3Ref = React.useRef(null);
      const ctaRef   = React.useRef(null);
      const scrollTo = ref => { if (ref.current && window.innerWidth < 960) setTimeout(() => ref.current.scrollIntoView({behavior:"smooth",block:"start"}), 220); };
      const go = id => e => { e.preventDefault(); const el = document.getElementById(id); if (el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'}); };
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      React.useEffect(() => {
        if (onTunnelChange) onTunnelChange({pubChecked, lpChoice, readyChecked, allChecked});
      }, [pubChecked, lpChoice, readyChecked]);

      const lpSlides = [
        {id:1,label:'Mariage · Luxe',        accent:'#C4A882',bg:'#FAF7F3'},
        {id:2,label:'Studio · Portrait',      accent:'#8A7FA8',bg:'#F5F3FA'},
        {id:3,label:'Extérieur · Nature',     accent:'#7A9E8B',bg:'#F3F8F5'},
        {id:4,label:'Mariage · Bohème',       accent:'#C49478',bg:'#FBF5F1'},
        {id:5,label:'Studio · Mode',          accent:'#6B8BB5',bg:'#F1F4FB'},
        {id:6,label:'Famille · Lifestyle',    accent:'#A88A7A',bg:'#F8F4F1'},
        {id:7,label:'Newborn · Douceur',      accent:'#C4A09A',bg:'#FBF5F4'},

      return (
        <section className="section tunnel" id="tunnel">
          <div className="container">

                <div className="eyebrow"><span className="rule"></span><span className="num">03</span><span>Ma méthode</span></div>

            </div>

            <div className="tunnel-steps">

              {/* ── Étape 1 ── */}
              <div className={"tunnel-step tst-card" + (pubChecked ? " tst-done" : "")}>

                <label className="tst-check">
                  <input type="checkbox" checked={pubChecked} onChange={e => { setPubChecked(e.target.checked); if (e.target.checked) scrollTo(step2Ref); }} />
                  <span>Je souhaite qu'on lance mes publicités</span>
                </label>
              </div>

              {/* ── Étape 2 ── */}
              <div ref={step2Ref} className={"tunnel-step tst-card" + (lpChoice ? " tst-done" : "")}>
                <div className="ts-num">02</div>
                <div className="ts-ico"><i data-lucide="layout"></i></div>
                <h3 className="ts-title">Landing page dédiée</h3>
                <p className="ts-desc">Une page de capture conçue pour convertir les visiteurs en prospects qualifiés, avec votre identité visuelle.</p>

                <div className="lp-carousel-incard">

                    <div className="lpc-track">
                      {lpSlides.slice(slide, slide+3).map(lp => (
                        <div key={lp.id} className="lpc-card" style={{background:lp.bg}}>
                          <div className="lpc-header" style={{background:lp.accent}}>
                            <div className="lpc-dot"></div><div className="lpc-dot"></div><div className="lpc-dot"></div>
                            <div className="lpc-nav-bar" style={{background:'rgba(255,255,255,0.3)'}}></div>

                          <div className="lpc-hero" style={{background:lp.accent+'33'}}></div>
                          <div className="lpc-lines">
                            <div className="lpc-line lpc-line-lg" style={{background:lp.accent+'99'}}></div>
                            <div className="lpc-line lpc-line-sm" style={{background:lp.accent+'55'}}></div>
                            <div className="lpc-cta-mock" style={{background:lp.accent}}></div>
                          </div>
                          <span className="lpc-label">{lp.label}</span>
                        </div>
                      ))}
                    </div>
                    <button className="lpc-btn" onClick={() => setSlide(s => Math.min(5, s+1))} disabled={slide>=5} aria-label="Suivant">›</button>
                  </div>
                </div>

                <div className="tst-radio-group">
                  <label className={"tst-radio" + (lpChoice==='need' ? " active" : "")}>
                    <input type="radio" name="lp" value="need" checked={lpChoice==='need'} onChange={() => { setLpChoice('need'); scrollTo(step3Ref); }} />
                    <span>J'ai besoin d'une landing page qui convertit</span>
                  </label>
                  <label className={"tst-radio" + (lpChoice==='have' ? " active" : "")}>
                    <input type="radio" name="lp" value="have" checked={lpChoice==='have'} onChange={() => { setLpChoice('have'); scrollTo(step3Ref); }} />
                    <span>J'ai déjà une landing page qui convertit</span>
                  </label>
                </div>
              </div>

              {/* ── Étape 3 ── */}
              <div ref={step3Ref} className={"tunnel-step tst-card" + (readyChecked ? " tst-done" : "")}>
                <div className="ts-num">03</div>
                <div className="ts-ico"><i data-lucide="calendar-check"></i></div>
                <h3 className="ts-title">Contact & Réservation</h3>
                <p className="ts-desc">Les leads arrivent directement dans votre boîte. Vous n'avez plus qu'à shooter — je m'occupe du reste.</p>
                <label className="tst-check">
                  <input type="checkbox" checked={readyChecked} onChange={e => { setReadyChecked(e.target.checked); if (e.target.checked) scrollTo(ctaRef); }} />
                  <span>Je suis prêt.e à recevoir des clients</span>

              {allChecked ? (
                <a className="btn btn-gold" href="#rappel" onClick={go('rappel')}>Faire une demande de devis <span className="arrow">→</span></a>
              ) : (
                <div className="tst-progress">
                  <div className="tst-progress-dots">
                    <span className={"tst-dot" + (pubChecked ? " done" : "")}></span>
                    <span className={"tst-dot" + (lpChoice ? " done" : "")}></span>
                    <span className={"tst-dot" + (readyChecked ? " done" : "")}></span>
                  </div>
                  <span className="tst-progress-lbl">Cochez les 3 étapes pour envoyer une demande de devis</span>
                </div>
              )}
            </div>
          </div>
        </section>
      );
    }
    // ─── Formulaire de contact ────────────────────────────────────────────────
    const ICO_PATHS = {
      video:'Pm22 8-6 4 6 4V8Z|R2,6,14,12,2',
      clock:'C12,12,10|PM12 6 12 12 16 14',
      user:'PM19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2|C12,7,4',
      shield:'PM20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z|Pm9 12 2 2 4-4'
    };
    function Ico({n}) {
      const parts = (ICO_PATHS[n]||'').split('|');
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          {parts.map((p,i) => {
            if (p.startsWith('C')) {const [,x,y,r]=p.split(',');return <circle key={i} cx={x} cy={y} r={r}/>;}
            if (p.startsWith('R')) {const [,x,y,w,h,rx]=p.split(',');return <rect key={i} x={x} y={y} width={w} height={h} rx={rx} ry={rx}/>;}
            return <path key={i} d={p.replace(/^P/,'')} />;
          })}
        </svg>
      );
    }
    function Callback({simData, tunnelData}) {
      const [form, setForm] = React.useState({prenom:'', telephone:'', email:''});

      const update = k => e => setForm(f => ({...f, [k]: e.target.value}));
      const fmtN = n => n != null ? Math.round(n) + ' €' : '—';

      const submit = async e => {
        e.preventDefault();
        setStatus('sending');
        const sim = simData || {};
        try {
          const res = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              access_key: '8ff579b2-c217-4683-95bf-49ccd0b57c4d',
              subject: `Demande de devis — ${form.prenom} (${sim.spec||'?'}, ${sim.pub||'?'}€ pub)`,
              'Prénom': form.prenom,
              'Email': form.email,
              'Téléphone': form.telephone,
              '— Simulation —': '─────────────',
              'Prestation': sim.spec || '—',
              'Panier moyen': sim.cart ? sim.cart + ' €' : '—',
              'Budget pub': sim.pub ? sim.pub + ' €/mois' : '—',
              'CA estimé': fmtN(sim.revenue),
              'Clients estimés': sim.clients ? Math.round(sim.clients) : '—',
              'Bénéfice estimé': fmtN(sim.benefice),
              'Abonnement': fmtN(sim.abo),
              '— Besoins —': '─────────────',
              'Publicités': td.pubChecked ? '✓ Souhaite lancer des publicités' : '—',

          const data = await res.json();

              <div className="cb-form">
                {status === 'success' ? (

                        {(td.pubChecked || td.lpChoice || td.readyChecked) && (
                          <>
                            <span className="cform-recap-intro" style={{marginTop: simData && simData.pub > 0 ? 12 : 0}}>Vos besoins&nbsp;:</span>
                            <ul className="cform-recap-list">
                              {td.pubChecked && <li>Lancer des publicités Meta Ads</li>}
                              {td.lpChoice === 'need' && <li>Créer une landing page qui convertit</li>}
                              {td.lpChoice === 'have' && <li>J'ai déjà une landing page</li>}
                              {td.readyChecked && <li>Prêt.e à recevoir des clients</li>}
                            </ul>
                          </>
                        )}
                      </div>
                    )}
                    <div className="cform-field">
                      <label className="cform-label">Prénom</label>
                      <input className="cform-input" type="text" required placeholder="Sophie" value={form.prenom} onChange={update('prenom')} />
                    </div>
                    <div className="cform-field">
                      <label className="cform-label">Téléphone</label>
                      <input className="cform-input" type="tel" required placeholder="06 12 34 56 78" value={form.telephone} onChange={update('telephone')} />
                    </div>
                    <div className="cform-field">
                      <label className="cform-label">Email</label>
                      <input className="cform-input" type="email" required placeholder="sophie@studio.fr" value={form.email} onChange={update('email')} />
                    </div>
                    {status === 'error' && <p className="cform-error">Une erreur est survenue, réessayez.</p>}
                    <button className="btn btn-gold cform-submit" type="submit" disabled={status==='sending'}>
                      {status==='sending' ? 'Envoi…' : 'Envoyer ma demande de devis →'}
                    </button>
                    <p className="cform-legal">Coordonnées utilisées uniquement pour vous recontacter.</p>
                  </form>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    }
    // ─── Footer ───────────────────────────────────────────────────────────────
    function Footer() {
      const go = id => e => { e.preventDefault(); const el = document.getElementById(id); if (el) window.scrollTo({top:el.offsetTop-60,behavior:'smooth'}); };
      return (
        <footer className="footer">
          <div className="container">
            <div className="footer-grid">

                </span>
                <p>Photographe au studio Amour & Lumière et media buyer spécialiste Meta Ads pour photographes. J'accompagne + de 50 photographes en France, Belgique et Suisse.</p>
              </div>
              <div>
                <h4>Naviguer</h4>
                <ul>
                  <li><a href="#studio" onClick={go('studio')}>Le studio</a></li>
                  <li><a href="#benefices" onClick={go('benefices')}>Bénéfices</a></li>
                  <li><a href="#simulateur" onClick={go('simulateur')}>Simulateur</a></li>
                </ul>
              </div>
              <div>
                <h4>Photographes</h4>
                <ul>
                  <li><a>Mariage</a></li>
                  <li><a>Grossesse &amp; nouveau-né</a></li>
                  <li><a>Famille &amp; portrait</a></li>
                  <li><a>Couple</a></li>
                </ul>
              </div>
              <div>
                <h4>Contact</h4>
                <ul>
                  <li><a>defoin.arthur@gmail.com</a></li>
                  <li><a href="#rappel" onClick={go('rappel')}>Réserver un appel</a></li>
                  <li><a>France · Belgique · Suisse</a></li>

              </div>
            </div>
            <div className="footer-bottom">
              <span>© 2026 Arthur Defoin • Media Buyer</span>
              <span>Mentions légales · Politique de confidentialité</span>
            </div>
          </div>
        </footer>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [simData, setSimData] = React.useState({});
      const [tunnelData, setTunnelData] = React.useState({});
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return (
        <div className="page">
          <Nav />
          <SideRail />
          <main>
            <HeroWow variant="anime" />
            <Simulateur onSimChange={setSimData} />
            <Tunnel onTunnelChange={setTunnelData} />
            <Callback simData={simData} tunnelData={tunnelData} />
            <Schema />
            <Studio />
            <Benefices />
          </main>
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Meta Pixel — conversion tracking -->
  <script>
    (function () {
      var fire = function (name, params) { if (typeof fbq === 'function') fbq('track', name, params || {}); };
      var checkoutFired = false;
      document.addEventListener('click', function (e) {
        var a = e.target.closest && e.target.closest('a[href="#rappel"]');
        if (a && !checkoutFired) { checkoutFired = true; fire('InitiateCheckout', { content_name: 'Reservation appel' }); }
      }, true);
      var vcFired = false;
      var tries = 0;
      var poll = setInterval(function () {
        var sim = document.getElementById('simulateur');
        if (sim && 'IntersectionObserver' in window) {
          clearInterval(poll);
          new IntersectionObserver(function (entries) {
            entries.forEach(function (en) { if (en.isIntersecting && !vcFired) { vcFired = true; fire('ViewContent', { content_name: 'Simulateur ROI' }); } });
          }, { threshold: 0.4 }).observe(sim);
        } else if (++tries > 40) clearInterval(poll);
      }, 250);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.event === 'calendly.event_scheduled') fire('Lead', { content_name: 'Appel decouverte reserve' });
      });
    })();
  </script>
