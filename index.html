    // ─── useTweaks (minimal — tweaks panel not shown in production) ───────────
    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
      }, []);
      return [values, setTweak];
    }
    // Stub tweaks panel — never shown in production (no __activate_edit_mode posted)
    function TweaksPanel() { return null; }
    function TweakSection() { return null; }
    function TweakSelect() { return null; }

    // ─── Nav ─────────────────────────────────────────────────────────────────
    function Nav({ ctaLabel = 'Tester le simulateur' }) {
      const [scrolled, setScrolled] = React.useState(false);
      const [open, setOpen] = React.useState(false);
      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 24);
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [open]);
      const go = (id) => (e) => {
        e.preventDefault(); setOpen(false);
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };
      return (
        <nav className={"nav" + (scrolled ? " scrolled" : "") + (open ? " menu-open" : "")}>
          <div className="container">
            <div className="nav-inner">
              <a className="nav-brand" href="#top" onClick={go('top')}>
                <img className="nav-logo" src="landing/logo-a.png" alt="Arthur Defoin" />
                <span className="brand-text">
                  <span className="name">Arthur Defoin</span>
                  <span className="tag">Publicité Meta · Photographes</span>
                </span>
              </a>
              <div className="nav-links">
                <a onClick={go('mecanisme')}>Le mécanisme</a>
                <a onClick={go('simulateur')} className="nav-link-sim">Simulateur</a>
                <a onClick={go('offre')}>Landing page</a>
                <a onClick={go('rappel')}>Demande de devis</a>
                <a onClick={go('studio')}>Mon studio</a>
                <button className="nav-cta nav-cta-mobile" onClick={go('simulateur')}>{ctaLabel}</button>
              </div>
              <button className="nav-cta nav-cta-desktop" onClick={go('simulateur')}>{ctaLabel}</button>
              <button className="nav-burger" aria-label="Menu" aria-expanded={open} onClick={() => setOpen(o => !o)}>
                <i data-lucide={open ? 'x' : 'menu'}></i>
              </button>
            </div>
          </div>
        </nav>
      );
    }

    // ─── SideRail ────────────────────────────────────────────────────────────
    function SideRail() {
      const sections = [
        { id: 'top', n: '01' },
        { id: 'mecanisme', n: '02' },
        { id: 'simulateur', n: '03' },
        { id: 'studio', n: '04' },
      ];
      const [active, setActive] = React.useState('top');
      React.useEffect(() => {
        const onScroll = () => {
          const y = window.scrollY + 200;
          let cur = sections[0].id;
          for (const s of sections) { const el = document.getElementById(s.id); if (el && el.offsetTop <= y) cur = s.id; }
          setActive(cur);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <div className="side-rail" aria-hidden="true">
          {sections.map(s => (
            <a key={s.id} className={active === s.id ? 'active' : ''}
               onClick={e => { e.preventDefault(); const el = document.getElementById(s.id); if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' }); }}>
              {s.n}
            </a>
          ))}
        </div>
      );
    }

    const CPL = 12, PANIER_SEUIL = 300, PUB_MIN = 100, PUB_MAX = 3500, PUB_DEFAUT = 500;

    const panierForSpec = s => PANIER_PAR_SPEC[s] ?? 200;
    function calcAbo(pub) {
      if (pub <= 390) return 390;
      if (pub <= 490) return pub;
      return 490 + (pub - 490) * 0.15;
    }
    function useCounterSim(value, duration=480) {
      const [display, setDisplay] = React.useState(value);
      const ref = React.useRef({from:value,to:value,start:0});
      React.useEffect(() => {
        ref.current = {from:display,to:value,start:performance.now()};
        let raf;
        const tick = t => {
          const {from,to,start} = ref.current;
          const k = Math.min(1,(t-start)/duration);
          const eased = 1-Math.pow(1-k,3);
          setDisplay(from+(to-from)*eased);
          if (k<1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [value]);
      return display;
    }
    const fmtEUR = n => new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(n))+' €';
    const fmtX = n => '× '+new Intl.NumberFormat('fr-FR',{minimumFractionDigits:1,maximumFractionDigits:1}).format(n);
    const fmtInt = n => new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Math.round(n));
    function SimSlider({value,min,max,step=1,onChange,ticks}) {
      const trackRef = React.useRef(null);
      const pct = (value-min)/(max-min)*100;

      const valueFromPointer = (e) => {
        const rect = trackRef.current.getBoundingClientRect();
        const clientX = e.clientX;
        const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        const raw = min + ratio * (max - min);
        const stepped = Math.round(raw / step) * step;
        return Math.max(min, Math.min(max, stepped));
      };

      const onPointerDown = (e) => {
        e.preventDefault();
        trackRef.current.setPointerCapture(e.pointerId);
        onChange(valueFromPointer(e));
      };

      const onPointerMove = (e) => {
        if (!trackRef.current.hasPointerCapture(e.pointerId)) return;
        onChange(valueFromPointer(e));
      };

      return (
        <div>
          <div className="sim-slider" ref={trackRef}
               onPointerDown={onPointerDown}
               onPointerMove={onPointerMove}
               style={{touchAction:'none', userSelect:'none'}}>
            <div className="sim-track"><div className="sim-fill" style={{width:pct+'%'}}></div></div>
            <div className="sim-thumb" style={{left:pct+'%'}}></div>
          </div>
          {ticks && <div className="sim-ticks">{ticks.map((t,i) => <span key={i}>{t}</span>)}</div>}
        </div>
      );
    }
    function Simulateur({onSimChange, onCtaClick}) {

      const cur = cardsData[cardIdx];

    // ─── Formulaire de contact ────────────────────────────────────────────────
    const ICO_PATHS = {
      video:'Pm22 8-6 4 6 4V8Z|R2,6,14,12,2',
      clock:'C12,12,10|PM12 6 12 12 16 14',
      user:'PM19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2|C12,7,4',
      shield:'PM20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z|Pm9 12 2 2 4-4'
    };
    function Ico({n}) {
      const parts = (ICO_PATHS[n]||'').split('|');
      return (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          {parts.map((p,i) => {
            if (p.startsWith('C')) {const [,x,y,r]=p.split(',');return <circle key={i} cx={x} cy={y} r={r}/>;}
            if (p.startsWith('R')) {const [,x,y,w,h,rx]=p.split(',');return <rect key={i} x={x} y={y} width={w} height={h} rx={rx} ry={rx}/>;}
            return <path key={i} d={p.replace(/^P/,'')} />;
          })}
        </svg>
      );
    }
    function Callback({simData}) {

      const [miniIdx, setMiniIdx] = React.useState(0);
      const [miniDragX, setMiniDragX] = React.useState(0);
      const miniVpRef = React.useRef(null);
      const [miniVpW, setMiniVpW] = React.useState(0);
      const successRef = React.useRef(null);
      React.useEffect(() => {
        if (!miniVpRef.current) return;
        const ro = new ResizeObserver(e => setMiniVpW(e[0].contentRect.width));
        ro.observe(miniVpRef.current);
        return () => ro.disconnect();
      }, []);
      React.useEffect(() => {
        if (status === 'success' && successRef.current) {
          setTimeout(() => successRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' }), 80);
        }
      }, [status]);
      const isMariage = formSpec === 'Mariage';
      const targets = isMariage ? [2, 5, 10, 20] : [10, 20, 30, 40, 50, 60];
      const aboFixe = isMariage
        ? {2:390, 5:490, 10:640, 20:990}
        : {10:390, 20:490, 30:570, 40:650, 50:720, 60:790};
      const miniCards = targets.map(n => ({clients:n, abo:aboFixe[n]}));
      const MINI_W = 148, MINI_GAP = 12, MINI_STEP = MINI_W + MINI_GAP;
      const miniTrackX = miniVpW ? miniVpW / 2 - miniIdx * MINI_STEP - MINI_W / 2 + miniDragX : 0;
      const miniPointerDown = e => {
        if (e.button !== 0 && e.pointerType !== 'touch') return;
        const vp = e.currentTarget;
        const initialTarget = e.target;
        vp.setPointerCapture(e.pointerId);
        const x0 = e.clientX, idx0 = miniIdx;
        let dragged = false;
        const onMove = ev => { const dx = ev.clientX - x0; if (Math.abs(dx) > 4) { dragged = true; setMiniDragX(dx); } };
        const onUp = ev => {
          const dx = ev.clientX - x0;
          setMiniDragX(0);
          vp.removeEventListener('pointermove', onMove);
          vp.removeEventListener('pointerup', onUp);
          if (dragged) {
            if (dx < -15 && idx0 < miniCards.length - 1) setMiniIdx(idx0 + 1);
            else if (dx > 15 && idx0 > 0) setMiniIdx(idx0 - 1);
          } else {

            }
          }

        vp.addEventListener('pointermove', onMove);
        vp.addEventListener('pointerup', onUp);
      };

      const update = k => e => setForm(f => ({...f, [k]:e.target.value}));

      const submit = async e => {

        const lpLabel = lpFormChoice === 'decouverte' ? 'Landing page Découverte'
          : lpFormChoice === 'complete' ? 'Landing page Complète'
          : lpFormChoice === 'have' ? 'Possède déjà une landing page'
          : '—';
        try {
          const res = await fetch('https://api.web3forms.com/submit', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              access_key: '8ff579b2-c217-4683-95bf-49ccd0b57c4d',
              subject: `Devis — ${form.prenom} (+${selClients||'?'} clients, ${selAbo||'?'}€/mois)`,
              'Prénom': form.prenom,
              'Email': form.email,
              'Téléphone': form.telephone,
              'Clients souhaités': selClients ? '+' + selClients + ' /mois' : '—',
              'Abonnement mensuel': selAbo ? selAbo + ' €' : '—',
              'Spécialité (simulateur)': sim.spec || '—',

              'Landing page': lpLabel,
              'Lancement souhaité': lancement || '—',
            })
          });
          const data = await res.json();
          setStatus(data.success ? 'success' : 'error');
          if (data.success && typeof fbq === 'function') fbq('track', 'Lead');
        } catch { setStatus('error'); }
      };

      const steps = ['Objectif', 'Landing page', 'Lancement', 'Contact'];

      return (
        <section className="section callback" id="rappel">

              <div className="cb-assur">
                <span><Ico n="user" /> Réponse sous <strong>24h</strong></span>
                <span><Ico n="video" /> Appel de <strong>30 min</strong></span>
                <span><Ico n="shield" /> Aucun <strong>engagement</strong></span>
              </div>
              {status !== 'success' && (
                <div className="cfw-progress">
                  {steps.map((lbl, i) => (
                    <React.Fragment key={i}>
                      <div className={"cfw-step-item" + (i+1 === step ? ' active' : '') + (i+1 < step ? ' done' : '')}
                        style={i+1 < step ? {cursor:'pointer'} : {}}
                        onClick={() => { if (i+1 < step) setStep(i+1); }}>
                        <div className="cfw-dot">{i+1 < step ? '✓' : i+1}</div>
                        <span className="cfw-step-name">{lbl}</span>
                      </div>
                      {i < steps.length - 1 && <div className={"cfw-connector" + (i+1 < step ? ' done' : '')} />}
                    </React.Fragment>
                  ))}
                </div>
              )}
            </div>

            {status === 'success' ? (
              <div className="cfw-success" ref={successRef}>
                <div className="cfw-success-ico">✓</div>
                <h3>Demande envoyée !</h3>
                <p>Je vous recontacte très bientôt. À très vite.</p>

                {step === 1 && (
                  <div className="cfw-panel">
                    <h3 className="cfw-title">Votre spécialité ?</h3>

                      {SIM_SPECIALITES.map(s => (

                          {s}

                    </div>
                    <p className="cfw-subtitle">Combien de clients par mois souhaitez-vous ?</p>
                    <div ref={miniVpRef} className="cfw-carousel-vp" onPointerDown={miniPointerDown}>
                      <div className="cfw-carousel-track" style={{
                        transform: `translateX(${miniTrackX}px)`,
                        transition: miniDragX ? 'none' : 'transform 0.35s cubic-bezier(.22,.68,0,1.2)'
                      }}>
                        {miniCards.map((c, i) => (
                          <div key={c.clients}
                            className={"cfw-mini-card" + (selClients === c.clients ? ' selected' : '')}

                    <button className={"btn btn-primary cfw-next" + (!selClients ? ' cfw-disabled' : '')}
                      onClick={() => { if (selClients) setStep(2); }}>
                      Valider mon objectif ↓
                    </button>
                  </div>
                )}

                {step === 2 && (
                  <div className="cfw-panel">
                    <h3 className="cfw-title">Avez-vous besoin d'une landing page ?</h3>
                    <div className="cfw-lp-cards">
                      <div className={"cfw-lp-card" + (lpFormChoice === 'decouverte' ? ' selected' : '')}

      const scrollTo = id => { const el = document.getElementById(id); if (el) window.scrollTo({top: el.offsetTop - 60, behavior: 'smooth'}); };

      const handleLpChoice = choice => {
        setLpChoice(choice);
        setTimeout(() => {
          const btn = document.querySelector('.offre-devis-wrap');
          if (btn) { const r = btn.getBoundingClientRect(); window.scrollTo({ top: r.top + window.scrollY - window.innerHeight / 2 + r.height / 2, behavior: 'smooth' }); }
        }, 80);
      };

      return (
        <div className="page">
          <Nav />
          <SideRail />
          <main>
            <HeroWow variant="anime" />
            <Schema />
            <Simulateur onSimChange={setSimData} onCtaClick={() => scrollTo('offre')} />
            <Offre lpChoice={lpChoice} onLpChoice={handleLpChoice} onDevisClick={() => scrollTo('rappel')} />
            <Callback simData={simData} />
            <Studio />
          </main>
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Meta Pixel — conversion tracking -->
  <script>
    (function () {
      var fire = function (name, params) { if (typeof fbq === 'function') fbq('track', name, params || {}); };
      var checkoutFired = false;
      document.addEventListener('click', function (e) {
        var a = e.target.closest && e.target.closest('a[href="#rappel"]');
        if (a && !checkoutFired) { checkoutFired = true; fire('InitiateCheckout', { content_name: 'Reservation appel' }); }
      }, true);
      var vcFired = false;
      var tries = 0;
      var poll = setInterval(function () {
        var sim = document.getElementById('simulateur');
        if (sim && 'IntersectionObserver' in window) {
          clearInterval(poll);
          new IntersectionObserver(function (entries) {
            entries.forEach(function (en) { if (en.isIntersecting && !vcFired) { vcFired = true; fire('ViewContent', { content_name: 'Simulateur ROI' }); } });
          }, { threshold: 0.4 }).observe(sim);
        } else if (++tries > 40) clearInterval(poll);
      }, 250);
      window.addEventListener('message', function (e) {
        if (e.data && e.data.event === 'calendly.event_scheduled') fire('Lead', { content_name: 'Appel decouverte reserve' });
      });
    })();
  </script>
</body>
</html>
